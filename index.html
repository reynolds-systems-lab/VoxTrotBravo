<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rob Reynolds | Systems & Structures</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for the interactive UI -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --grid: rgba(255, 255, 255, 0.03);
            --accent: #10b981; /* Emerald 500 */
        }

        body {
            background-color: var(--bg);
            color: #999;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .blueprint {
            background-image: 
                linear-gradient(to right, var(--grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .normal-text {
            text-transform: none;
            font-family: 'Inter', sans-serif;
            letter-spacing: normal;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .no-scroll { overflow: hidden; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        .code-block {
            font-family: 'JetBrains Mono', monospace;
            text-transform: none;
        }
        
        .nav-link {
            position: relative;
            transition: color 0.2s;
        }
        .nav-link.active { color: white; }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 1px;
            background: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const Icon = ({ name, size = 18, className = "" }) => {

                title: "Massive Voxel Optimizer",
                filename: "blender-script-jumbo.txt",

            {
                id: 'smooth',

                filename: "blender-script-smooth.txt",

                gallery: ["images/builds-hexa2-thumb.webp", "images/builds-hexa3-thumb.webp"]

                role: "Lead Designer & Builder",

                gallery: ["images/builds-memory1-thumb.webp"]

            { id: 'g2', title: "Geometric Flow", type: "VR Render", thumb: "images/vox-fan1-thumb.webp", full: "images/vox-fan1-full.webp" },
            { id: 'g3', title: "The Cathedral", type: "Voxel Architecture", thumb: "images/vox-deco1-thumb.webp", full: "images/vox-deco1-full.webp" },

            { id: 'g7', title: "Structural Tower", type: "Voxel Engine Study", thumb: "images/vox-tower1-thumb.webp", full: "images/vox-tower1-full.webp" },
            { id: 'g8', title: "Dodecahedron Bug", type: "Form Study", thumb: "images/vox-bug1-thumb.webp", full: "images/vox-bug1-full.webp" },
            { id: 'g9', title: "Circligit", type: "Voxel Study", thumb: "images/vox-circligit-thumb.webp", full: "images/vox-circligit-full.webp" },
            { id: 'g10', title: "Deco Pavillion", type: "Architecture", thumb: "images/vox-deco2-thumb.webp", full: "images/vox-deco2-full.webp" },
            { id: 'g11', title: "The Egg II", type: "Wireframe Shell", thumb: "images/vox-egg2-thumb.webp", full: "images/vox-egg2-full.webp" },
            { id: 'g12', title: "Forest Study", type: "Landscape", thumb: "images/vox-forest1-thumb.webp", full: "images/vox-forest1-full.webp" },
            { id: 'g13', title: "Voxel Residence", type: "Residential Study", thumb: "images/vox-house1-thumb.webp", full: "images/vox-house1-full.webp" },
            { id: 'g14', title: "Ico Platonic", type: "Geometric Solid", thumb: "images/vox-ico1-thumb.webp", full: "images/vox-ico1-full.webp" },
            { id: 'g15', title: "Luminescent Lamp", type: "Emission Study", thumb: "images/vox-lamp1-thumb.webp", full: "images/vox-lamp1-full.webp" },
            { id: 'g16', title: "Voxel Pavilion", type: "Voxel Structure", thumb: "images/vox-magic1-thumb.webp", full: "images/vox-magic1-full.webp" },
            { id: 'g17', title: "Stairway Study", type: "Verticality", thumb: "images/vox-stairway1-thumb.webp", full: "images/vox-stairway1-full.webp" },

            { id: 'g19', title: "Wee Form Study", type: "Small Scale", thumb: "images/vox-wee1-thumb.webp", full: "images/vox-wee1-full.webp" },
            { id: 'g20', title: "Architectural Twist", type: "Form Study", thumb: "images/grsk-twist1-thumb.webp", full: "images/grsk-twist1-full.webp" },
            { id: 'g21', title: "City Study", type: "City Study", thumb: "images/grsk-newton1-thumb.webp", full: "images/grsk-newton1-full.webp" },
            { id: 'g22', title: "Brick Logic", type: "Tool Study", thumb: "images/grsk-brick-thumb.webp", full: "images/grsk-brick-full.webp" }
        ];

        const Nav = ({ current, setView }) => (
            <nav className="fixed top-0 w-full z-50 bg-[#0a0a0a]/90 border-b border-white/5 backdrop-blur-sm px-6 h-14 flex items-center justify-between">
                <div className="flex items-center gap-6">
                    <span className="text-white font-bold text-xs tracking-tighter cursor-pointer" onClick={() => setView('home')}>reynolds-systems-lab</span>
                    <div className="h-4 w-px bg-white/10 hidden sm:block"></div>
                    <div className="flex items-center gap-6">
                        {['home', 'engine', 'archive', 'art', 'about'].map(v => (
                            <button 
                                key={v} 
                                onClick={() => setView(v)}
                                className={`text-[10px] font-black tracking-widest nav-link ${current === v ? 'active' : 'text-neutral-600 hover:text-white'}`}

                <div className="hidden md:flex items-center gap-4">

                    <a href="engine.html" className="bg-white text-black h-8 px-4 flex items-center text-[9px] font-black hover:bg-neutral-200 transition-colors">LAUNCH_ENGINE</a>

        const HomeView = ({ setView }) => (

                        <p className="normal-text text-neutral-500 text-lg max-w-xl text-left">
                            Artist, designer, and builder.
                        </p>
                    </div>
                    <div className="lg:col-span-4 flex flex-col gap-2">
                        <button onClick={() => setView('engine')} className="border border-white/10 p-6 flex justify-between items-center group hover:bg-white/5 transition-all text-left">
                            <span className="text-[10px] font-black">Spatial Engine Documentation</span>
                            <Icon name="arrow-right" size={14} className="text-neutral-700 group-hover:text-white" />
                        </button>
                        <button onClick={() => setView('archive')} className="border border-white/10 p-6 flex justify-between items-center group hover:bg-white/5 transition-all text-left">
                            <span className="text-[10px] font-black">Physical Build Archive</span>
                            <Icon name="arrow-right" size={14} className="text-neutral-700 group-hover:text-white" />
                        </button>
                    </div>
                </section>

                <section className="border-t border-white/5 pt-12">
                    <div className="aspect-[21/9] bg-neutral-900 border border-white/5 relative overflow-hidden group cursor-pointer" onClick={() => setView('engine')}>
                        <img src="images/vox-tower1-full.webp" className="w-full h-full object-cover opacity-20 grayscale group-hover:opacity-100 group-hover:grayscale-0 transition-all duration-1000" />
                        <div className="absolute inset-0 p-10 flex flex-col justify-end text-left">
                            <span className="text-[10px] font-black text-emerald-500 mb-2">VOXTROTBRAVO // CORE ENGINE</span>
                            <h2 className="text-4xl font-black text-white tracking-tighter uppercase leading-none">Spatial Building System</h2>
                        </div>
                    </div>
                </section>
            </div>
        );

        const EngineView = ({ scripts }) => {
            const [activeId, setActiveId] = useState(scripts[0]?.id);
            const activeScript = scripts.find(s => s.id === activeId) || scripts[0];
            
            const copyCode = (code) => {
                const el = document.createElement('textarea');
                el.value = code;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            };

            return (
                <div className="space-y-24 py-10 fade-in text-left max-w-6xl mx-auto">
                    <section className="space-y-12">
                        <div className="space-y-4">
                            <h2 className="text-4xl font-black text-white tracking-tighter uppercase">VoxTrotBravo Engine</h2>
                            <p className="normal-text text-neutral-500 text-lg">Web-based PCVR engine optimized for high-density voxel prototyping. Developed with Three.js.</p>
                            <div className="flex gap-4">
                                <a href="engine.html" className="bg-emerald-500 text-black px-6 py-3 text-[10px] font-black hover:bg-emerald-400 transition-colors">ACCESS_LIVE_BUILD</a>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-12 border-t border-white/5 pt-12">
                            <div className="space-y-8">
                                <h3 className="text-xs font-black text-white border-b border-emerald-500/30 pb-2 flex items-center gap-2 uppercase tracking-tighter">
                                    <Icon name="gamepad-2" size={14}/> Universal Controls
                                </h3>
                                <div className="space-y-6 text-left">
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-black text-neutral-400 uppercase">Navigation & Manipulation</p>
                                        <ul className="text-xs text-neutral-500 space-y-2 normal-text leading-relaxed list-disc list-inside">
                                            <li><span className="text-neutral-300 font-bold">Both Grips:</span> Move, rotate, and scale world.</li>
                                            <li><span className="text-neutral-300 font-bold">Single Grip:</span> Relative world movement.</li>
                                            <li><span className="text-neutral-300 font-bold">Vertical Lock:</span> Restricts rotation to Y-axis (Global Settings).</li>
                                        </ul>
                                    </div>
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-black text-neutral-400 uppercase">Drawing & Interaction</p>
                                        <ul className="text-xs text-neutral-500 space-y-2 normal-text leading-relaxed list-disc list-inside">
                                            <li><span className="text-neutral-300 font-bold">Right Trigger:</span> Primary Draw / Select / Interaction.</li>
                                            <li><span className="text-neutral-300 font-bold">Left Trigger:</span> Erase / Drop Selection.</li>
                                            <li><span className="text-neutral-300 font-bold">Joysticks:</span> Shift HSL values in active color slots.</li>
                                        </ul>
                                    </div>
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-black text-neutral-400 uppercase">Menus</p>
                                        <ul className="text-xs text-neutral-500 space-y-2 normal-text leading-relaxed list-disc list-inside">
                                            <li><span className="text-neutral-300 font-bold">Right Buttons (A/B):</span> Tools Menu / Global Settings.</li>
                                            <li><span className="text-neutral-300 font-bold">Left Buttons (X/Y):</span> Tool Options / Materials & Colors.</li>
                                        </ul>
                                    </div>
                                </div>

                                <h3 className="text-xs font-black text-white border-b border-white/10 pb-2 flex items-center gap-2 uppercase tracking-tighter pt-4">
                                    <Icon name="monitor" size={14}/> System Requirements
                                </h3>
                                <div className="space-y-4 text-[10px] text-neutral-500 font-bold uppercase">
                                    <div className="flex gap-4"><span className="text-white w-24 shrink-0">VR Hardware:</span> Meta Quest 3 / Pro (Link/AirLink), Valve Index, Vive.</div>
                                    <div className="flex gap-4"><span className="text-white w-24 shrink-0">Web Browser:</span> Latest Chrome / Edge (WebXR Support Required).</div>
                                    <div className="flex gap-4"><span className="text-white w-24 shrink-0">Hardware:</span> Dedicated GPU required for high voxel counts.</div>
                                </div>
                            </div>

                            <div className="space-y-8">
                                <h3 className="text-xs font-black text-white border-b border-emerald-500/30 pb-2 flex items-center gap-2 uppercase tracking-tighter">
                                    <Icon name="wrench" size={14}/> Engine Toolset
                                </h3>
                                <div className="grid grid-cols-2 gap-x-8 gap-y-6 text-left">
                                    {[
                                        { n: "01", t: "Brush", d: "Standard placement. Cube/Sphere shapes. Solid/Shell volumes." },
                                        { n: "02", t: "Extrude", d: "Pull voxels along axes (Free/X/Y/Z) or connected volumes." },
                                        { n: "03", t: "Line & Arc", d: "Straight segments and Bezier arcs. Two-hand sheet mode." },
                                        { n: "04", t: "Paint", d: "Standard brush recolor and connected flood fill." },
                                        { n: "05", t: "Soft Sculpt", d: "Probabilistic density brush for organic terrain or clouds." },
                                        { n: "06", t: "Box Tool", d: "Massive rectangular volumes with wireframe and grid options." },
                                        { n: "07", t: "Quad Sphere", d: "Ellipsoid shell and solid volume generation." },

                                        { n: "11", t: "Plane", d: "2D sheets and outlines with variable thickness." },
                                        { n: "12", t: "Select", d: "Comprehensive Transform (Move, Copy, Pivot, Scale)." }

                                            <p className="text-[9px] font-black text-white">{tool.n} // {tool.t}</p>

        const ArtView = ({ setLightbox }) => {
            const voxItems = GALLERY.filter(item => item.thumb.includes('vox-'));
            const grskItems = GALLERY.filter(item => item.thumb.includes('grsk-'));

            const GalleryGrid = ({ items }) => (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    {items.map(item => (

                <div className="space-y-32 py-10 fade-in text-left">
                    <section className="space-y-12">
                        <div className="space-y-6 max-w-3xl">
                            <div className="space-y-2">
                                <h2 className="text-4xl font-black text-white tracking-tighter uppercase leading-none">VoxTrotBravo_Renders</h2>
                                <p className="text-[10px] font-black text-neutral-700 uppercase tracking-widest">Process Studies & Digital Alchemy</p>
                            </div>
                            <p className="normal-text text-neutral-500 text-sm leading-relaxed">
                                A collection of renders made while developing VoxTrotBravo. Each feature added felt like a new spell I could cast. Although they were made very quickly with playful gestures I hope they convey some of my joy.
                            </p>
                        </div>
                        <GalleryGrid items={voxItems} />
                    </section>

                    <section className="space-y-12 border-t border-white/5 pt-24">
                        <div className="space-y-6 max-w-3xl">
                            <div className="space-y-2">
                                <h2 className="text-4xl font-black text-white tracking-tighter uppercase leading-none">VR_Sculptures</h2>
                                <p className="text-[10px] font-black text-neutral-700 uppercase tracking-widest">Pre-VoxTrot Form Research</p>
                            </div>
                            <p className="normal-text text-neutral-500 text-sm leading-relaxed">
                                These represent a glimpse of a mountain of VR sculptures I have made in the years leading to the development of VoxTrotBravo. VoxTrotBravo is the lovechild of myself and this medium.
                            </p>
                        </div>
                        <GalleryGrid items={grskItems} />
                    </section>
                </div>
            );
        };

        const AboutView = () => (
            <div className="max-w-5xl mx-auto space-y-32 fade-in text-left pb-20">
                <section className="grid md:grid-cols-2 gap-20 items-start">
                    <div className="space-y-12">
                        <div className="aspect-[3/4] bg-neutral-900 border border-white/5 grayscale hover:grayscale-0 hover:brightness-110 transition-all duration-700 overflow-hidden shadow-2xl group">
                            <img src="images/life-dog-full.webp" className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" loading="lazy" />
                        </div>
                        <div className="p-8 border border-white/5 bg-neutral-900/10 text-center font-black text-[9px] tracking-widest text-neutral-700 uppercase">
                            WPG_MB // REYNOLDS_LAB
                        </div>
                    </div>
                    <div className="space-y-12">
                        <div className="space-y-4 text-left">
                            <h2 className="text-6xl font-black tracking-tighter text-white leading-none uppercase">Rob <br/> Reynolds</h2>
                            <p className="text-[8px] text-neutral-700 font-black tracking-[0.5em] border-b border-white/5 pb-6 uppercase">Designer • Artist • Builder</p>
                        </div>
                        <div className="space-y-8 normal-text text-neutral-500 text-base leading-relaxed font-light text-left">
                            <p>Freelance designer, artist, and builder based in Winnipeg, MB.</p>
                            <p>My work explores the intersection of digital spatial systems and physical craft. From custom software to monumental structures, I specialize in high-precision fabrication and spatial exploration.</p>
                        </div>
                        <div className="space-y-4 pt-10 border-t border-white/5 text-left">
                            <a href="mailto:reynoldssystemslab@gmail.com" className="w-full flex justify-between items-center border border-white/10 py-10 px-12 hover:bg-white hover:text-black transition-all uppercase">
                                <span className="text-xs font-black tracking-[0.4em]">Establish_Contact</span> 
                                <Icon name="send" size={18} />
                            </a>
                            <a href="https://ko-fi.com/robertreynolds63876" target="_blank" className="w-full flex justify-between items-center border border-emerald-500/20 py-10 px-12 hover:bg-emerald-500 hover:text-black transition-all uppercase group">
                                <span className="text-xs font-black tracking-[0.4em]">Support_The_Project</span> 
                                <Icon name="heart" size={18} className="text-emerald-500 group-hover:text-black" />
                            </a>
                        </div>
                    </div>
                </section>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('home');
            const [lightbox, setLightbox] = useState(null);
            const [scripts, setScripts] = useState(BLENDER_SCRIPTS_META);

            useEffect(() => {
                const loadScripts = async () => {
                    const updatedScripts = await Promise.all(BLENDER_SCRIPTS_META.map(async (s) => {
                        try {
                            const res = await fetch(`blender-scripts/${s.filename}`);
                            if (!res.ok) throw new Error();
                            const code = await res.text();
                            return { ...s, code };
                        } catch (e) {
                            console.error("Failed to fetch script:", s.filename);
                            return s;
                        }
                    }));
                    setScripts(updatedScripts);
                };
                loadScripts();
            }, []);

            useEffect(() => {
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
                window.scrollTo(0, 0);
            }, [view, lightbox]);

            useEffect(() => {
                if (lightbox) document.body.classList.add('no-scroll');
                else document.body.classList.remove('no-scroll');
            }, [lightbox]);

            return (
                <div className="min-h-screen blueprint pb-20">
                    <Nav current={view} setView={setView} />
                    
                    <main className="pt-24 px-6 max-w-[1400px] mx-auto">
                        {view === 'home' && <HomeView setView={setView} />}
                        {view === 'engine' && <EngineView scripts={scripts} />}
                        {view === 'archive' && <ArchiveView setLightbox={setLightbox} />}
                        {view === 'art' && <ArtView setLightbox={setLightbox} />}
                        {view === 'about' && <AboutView />}
                    </main>

                    {lightbox && (
                        <div className="fixed inset-0 z-[100] bg-black/98 flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setLightbox(null)}>
                            <div className="absolute top-8 right-8 text-white/30 hover:text-white transition-colors">
                                <Icon name="x" size={32} />
                            </div>
                            <img src={lightbox.full} alt={lightbox.title} className="max-w-full max-h-full object-contain shadow-2xl" />
                            <div className="absolute bottom-8 left-8 text-left space-y-1">
                                <p className="text-white font-black text-lg uppercase tracking-tighter">{lightbox.title}</p>
                                <p className="text-neutral-600 text-xs font-black uppercase tracking-widest">{lightbox.type}</p>
                            </div>
                        </div>
                    )}

                    <footer className="mt-24 border-t border-white/5 py-12 px-6">
                        <div className="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-8 text-[9px] font-black text-neutral-800 uppercase">
                            <p>© 2026 R. REYNOLDS // WINNIPEG, MB</p>
                            <div className="flex gap-10">
                                <button onClick={() => setView('about')} className="hover:text-neutral-500 transition-colors uppercase">Profile</button>
                                <span className="text-neutral-900 select-none">SYSTEM_READY</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
