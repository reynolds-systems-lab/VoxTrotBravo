<!-- 
    Rob Reynolds Portfolio & VoxTrotBravo Hub
    A humble workbench for a designer, artist, and builder.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rob Reynolds | Designer • Artist • Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;700&display=swap');
        
        :root {
            --bg: #080808;
            --grid: rgba(255, 255, 255, 0.04);
        }

        body {
            background-color: var(--bg);
            color: #a3a3a3;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .blueprint {
            background-image: 
                linear-gradient(to right, var(--grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .normal-text {
            text-transform: none;
            font-family: 'Inter', sans-serif;
            letter-spacing: normal;
        }

        .btn-sharp {
            border-radius: 0;
            transition: all 0.2s ease;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons are handled by Lucide tags in the render
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const ALL_WORK = [
            {
                id: 'voxtrot',
                title: "VoxTrotBravo",
                category: "Building Tool",
                description: "A spatial engine for 3D sketching. Performance-tuned to manage upwards of a million dynamic voxels in real-time. Tested successfully at 29M units.",
                tags: ["VR", "Three.js", "Spatial"],
                color: "text-emerald-400"
            },
            {
                id: 'campground-tower',
                title: "Campground Tower",
                category: "Physical Structure",
                description: "A site-specific build exploring height and stability. Traditional joinery designed to fit the landscape.",
                tags: ["Build", "Timber", "Architecture"],
                color: "text-amber-600"
            },
            {
                id: 'memory-lane',
                title: "Memory Lane",
                category: "Interactive Archive",
                description: "Celebrating 50 years of music and community through a digital historical archive for the Winnipeg Folk Festival.",
                tags: ["UX", "Archival", "Design"],
                color: "text-blue-400",
                link: "https://www.winnipegfolkfestival.ca/memory-lane/"
            }
        ];

        const PHYSICAL_CRAFTS = [
            { id: 'banjos', title: "Instrument Design", description: "Lutherie work exploring tension and resonance. Building the tools that make the music.", icon: "music", material: "Maple / Walnut" },
            { id: 'tops', title: "Spinning Tops", description: "Lathe-turned kinetic objects. Small exercises in balance, center of gravity, and momentum.", icon: "wind", material: "Various Woods" },
            { id: 'joinery', title: "Buildings", description: "Large-scale structures focusing on timber joinery, recycled materials, and functional craft.", icon: "wrench", material: "Cedar / Pine" }
        ];

        const DIGITAL_ART = [
            { id: 1, title: "Sculptural Render 01", year: "2024", type: "VR Form", img: "https://placehold.co/600x600/111/4facfe?text=VR+Sculpture" },
            { id: 2, title: "Geometric Study", year: "2023", type: "Digital", img: "https://placehold.co/600x600/111/00ffcc?text=Form+Study" },
            { id: 3, title: "Procedural Noise", year: "2023", type: "Generative", img: "https://placehold.co/600x600/111/ff0055?text=Abstraction" },
            { id: 4, title: "Light & Volume", year: "2022", type: "3D Sketch", img: "https://placehold.co/600x600/111/ffff00?text=Geo+Flow" },
            { id: 5, title: "Form Sequence", year: "2024", type: "Voxel Art", img: "https://placehold.co/600x600/111/999999?text=Light+Study" },
            { id: 6, title: "Abstract Logic", year: "2023", type: "Illustration", img: "https://placehold.co/600x600/111/4facfe?text=Structure" }
        ];

        const App = () => {
            const [view, setView] = useState('home');
            const [time, setTime] = useState(new Date().toLocaleTimeString());

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date().toLocaleTimeString()), 1000);
                lucide.createIcons();
                return () => clearInterval(timer);
            }, [view]);

            const navigate = (v) => {
                setView(v);
                window.scrollTo(0, 0);
            };

            return (
                <div className="min-h-screen blueprint">
                    {/* Nav */}
                    <nav className="fixed top-0 w-full z-50 bg-[#080808]/95 border-b border-white/10 px-6 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-4 cursor-pointer group" onClick={() => navigate('home')}>
                            <div className="w-8 h-8 border border-white/20 flex items-center justify-center text-white font-black italic group-hover:bg-white group-hover:text-black transition-all">R</div>
                            <div className="hidden sm:flex flex-col leading-none">
                                <span className="text-white font-bold text-[11px]">Rob Reynolds</span>
                                <span className="text-[8px] text-neutral-600 mt-1 font-black">Workshop v.01</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-1 bg-white/5 p-1 border border-white/5">
                            {['home', 'work', 'art', 'about'].map(v => (
                                <button key={v} onClick={() => navigate(v)} className={`px-4 py-2 text-[9px] font-black tracking-widest transition-all ${view === v ? 'bg-white text-black' : 'text-neutral-600 hover:text-white'}`}>
                                    {v}
                                </button>
                            ))}
                        </div>
                        <div className="hidden lg:flex items-center gap-6 text-[9px] font-black text-neutral-700">
                            <span className="flex items-center gap-2 px-2 py-1 bg-white/5 border border-white/5"><Icon name="map-pin" size={10}/> WPG_MB</span>
                            <span className="flex items-center gap-2"><Icon name="clock" size={10}/> {time}</span>
                            <a href="engine.html" className="border border-emerald-900/50 text-emerald-500 h-7 flex items-center px-4 hover:bg-emerald-500 hover:text-black transition-all font-black">
                                Launch_Engine
                            </a>
                        </div>
                    </nav>

                    <main className="pt-32 pb-20 px-6 max-w-[1400px] mx-auto">
                        {view === 'home' && <HomeView navigate={navigate} />}
                        {view === 'work' && <WorkView navigate={navigate} />}
                        {view === 'art' && <ArtView />}
                        {view === 'about' && <AboutView />}
                    </main>

                    <footer className="border-t border-white/5 py-12 bg-black/50 px-6">
                        <div className="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-8 text-[9px] font-black text-neutral-800 uppercase">
                            <div className="flex gap-8">
                                <p>© 2026 R. Reynolds</p>
                                <p>Built in Winnipeg</p>
                            </div>
                            <div className="flex gap-10 items-center">
                                <a href="https://github.com/banjomanrob-oss" className="hover:text-white transition-colors">GitHub</a>
                                <button onClick={() => navigate('about')} className="text-emerald-900 hover:text-emerald-500 flex items-center gap-2 transition-colors">
                                    <Icon name="heart" size={12}/> Project_Support
                                </button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const HomeView = ({ navigate }) => (
            <div className="space-y-12 fade-in">
                <div className="bg-neutral-900/10 border border-white/5 p-12 space-y-10 relative">
                    <div className="space-y-6">
                        <p className="text-[10px] font-black text-neutral-600 tracking-[0.4em]">Designer • Artist • Builder</p>
                        <h1 className="text-5xl md:text-8xl font-black tracking-tighter text-white leading-[0.85]">
                            Tools for <br /> Digital <br /> <span className="text-neutral-700 italic">Craft</span>
                        </h1>
                        <p className="normal-text text-neutral-500 max-w-2xl text-lg leading-relaxed">
                            Designing environments where complexity is managed by intuition. Building systems that allow for a direct connection between the creator and the form.
                        </p>
                    </div>
                    <div className="flex flex-wrap gap-6">
                        <button onClick={() => navigate('work')} className="bg-white text-black hover:bg-neutral-200 btn-sharp px-10 h-14 text-xs font-black">Archive_Index</button>
                        <button onClick={() => navigate('art')} className="border border-white/10 hover:border-white text-white btn-sharp px-10 h-14 text-xs font-black transition-all">Visuals</button>
                    </div>
                    <div className="absolute bottom-10 right-12 text-[8px] text-neutral-800 font-black tracking-widest hidden md:block">Handmade_Winnipeg_MB</div>
                </div>

                <div className="space-y-6">
                    <div className="flex justify-between items-center border-b border-white/5 pb-4">
                        <p className="text-[9px] font-black text-neutral-700 underline underline-offset-8 decoration-emerald-900/50">Core_Project</p>
                        <span className="text-[9px] text-neutral-800 font-black">v2.5 // BUILD_JOY</span>
                    </div>
                    <div className="relative aspect-[21/9] bg-neutral-900 border border-white/5 overflow-hidden group cursor-pointer" onClick={() => window.location.href='engine.html'}>
                        <img src="https://placehold.co/1400x600/0a0a0a/333?text=VoxTrotBravo+Workshop" className="w-full h-full object-cover grayscale opacity-20 group-hover:opacity-40 transition-all duration-1000" />
                        <div className="absolute inset-0 flex items-center p-12">
                            <div className="space-y-6 max-w-lg text-left">
                                <h2 className="text-5xl font-black text-white tracking-tighter">VoxTrot_Bravo</h2>
                                <p className="text-xs text-neutral-500 normal-text leading-relaxed">
                                    A spatial tool built to prioritize creative flow. A study in color, light, and high-performance voxel architecture.
                                </p>
                                <button className="border border-emerald-900/50 text-emerald-500 text-[10px] px-8 py-6 hover:bg-emerald-500 hover:text-black transition-all font-black">Launch_Engine</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const WorkView = ({ navigate }) => (
            <div className="space-y-24 fade-in">
                <div className="space-y-4">
                    <h2 className="text-5xl font-black tracking-tighter text-white uppercase">The_Archive</h2>
                    <p className="text-[10px] font-black text-neutral-700">A mix of physical and digital construction.</p>
                </div>

                <div className="space-y-12">
                    <div className="text-[8px] font-black text-neutral-800 tracking-[0.8em] flex items-center gap-4">
                        <div className="flex-1 h-px bg-white/5"></div> PHYSICAL_CRAFT <div className="flex-1 h-px bg-white/5"></div>
                    </div>
                    <div className="grid md:grid-cols-3 gap-6">
                        {PHYSICAL_CRAFTS.map(craft => (
                            <div key={craft.id} className="group border border-white/5 p-10 hover:bg-neutral-900/20 transition-all flex flex-col justify-between text-left">
                                <div className="space-y-8">
                                    <div className="w-10 h-10 border border-neutral-900 flex items-center justify-center group-hover:border-white transition-colors">
                                        <Icon name={craft.icon} className="text-neutral-700 group-hover:text-white" />
                                    </div>
                                    <div className="space-y-2">
                                        <h3 className="text-lg font-black text-white">{craft.title}</h3>
                                        <p className="text-[11px] text-neutral-600 normal-text leading-relaxed">{craft.description}</p>
                                    </div>
                                </div>
                                <div className="pt-8 mt-10 border-t border-white/5 text-[8px] font-black text-neutral-800 flex justify-between items-center group-hover:text-neutral-500">
                                    <span>MAT: {craft.material}</span>
                                    <Icon name="arrow-right" size={12} />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                <div className="space-y-12">
                    <div className="text-[8px] font-black text-neutral-800 tracking-[0.8em] flex items-center gap-4">
                        <div className="flex-1 h-px bg-white/5"></div> INTERACTIVE_SYSTEMS <div className="flex-1 h-px bg-white/5"></div>
                    </div>
                    <div className="grid md:grid-cols-2 gap-8">
                        {ALL_WORK.map(p => (
                            <div key={p.id} className="group p-8 border border-white/5 hover:border-white/20 transition-all flex gap-8 items-center bg-neutral-900/5 text-left">
                                <div className="w-32 h-32 bg-neutral-900 shrink-0 border border-white/5 grayscale group-hover:grayscale-0 overflow-hidden">
                                    <img src={`https://placehold.co/400x400/111/333?text=${p.title}`} className="w-full h-full object-cover opacity-40" />
                                </div>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <p className="text-[8px] font-black text-neutral-800 tracking-widest">{p.category}</p>
                                        <h3 className="text-2xl font-black text-white tracking-tighter">{p.title}</h3>
                                    </div>
                                    <p className="text-[11px] text-neutral-500 normal-text leading-relaxed line-clamp-3">{p.description}</p>
                                    <div className="pt-4 flex items-center gap-6">
                                        {p.link ? (
                                            <a href={p.link} target="_blank" className="text-[9px] font-black text-white hover:underline flex items-center gap-2">Visit_Site <Icon name="external-link" size={10}/></a>
                                        ) : (
                                            <button onClick={() => p.id === 'voxtrot' ? window.location.href='engine.html' : null} className="text-[9px] font-black text-white hover:underline">Launch_Engine</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const ArtView = () => (
            <div className="space-y-16 fade-in">
                <div className="space-y-4">
                    <h2 className="text-5xl font-black tracking-tighter text-white uppercase">Visual_Gallery</h2>
                    <p className="text-neutral-700 text-xs font-black tracking-widest">Digital sketches and sculptural renders.</p>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    {DIGITAL_ART.map(art => (
                        <div key={art.id} className="relative aspect-square bg-neutral-900 group border border-white/5 p-1">
                            <img src={art.img} className="w-full h-full object-cover grayscale opacity-30 group-hover:opacity-100 group-hover:grayscale-0 group-hover:scale-105 transition-all duration-1000" />
                            <div className="absolute inset-0 bg-black/90 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-between p-8 border border-white/10 text-left">
                                <div className="space-y-1">
                                    <span className="text-[8px] text-white font-black tracking-widest">{art.year} // {art.type}</span>
                                    <p className="text-xs font-black text-white">{art.title}</p>
                                </div>
                                <div className="w-8 h-8 border border-white/10 flex items-center justify-center">
                                    <Icon name="maximize-2" size={12} className="text-neutral-700" />
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
                <div className="text-center py-20 border-t border-dashed border-white/5">
                    <p className="text-[10px] text-neutral-900 font-black tracking-[1em]">Archive_Continued</p>
                </div>
            </div>
        );

        const AboutView = () => (
            <div className="max-w-5xl mx-auto space-y-32 fade-in text-left">
                <section className="grid md:grid-cols-2 gap-20 items-start">
                    <div className="space-y-12">
                        <div className="aspect-[3/4] bg-neutral-900 border border-white/5 grayscale">
                            <img src="https://placehold.co/600x800/111/4facfe?text=Rob+Reynolds" className="w-full h-full object-cover opacity-80" />
                        </div>
                        <div className="p-8 border border-white/5 bg-neutral-900/10 text-center">
                            <p className="text-[10px] text-neutral-800 font-black tracking-widest uppercase">WPG_MB // REYNOLDS_LAB</p>
                        </div>
                    </div>
                    <div className="space-y-12">
                        <div className="space-y-4">
                            <h2 className="text-6xl font-black tracking-tighter text-white leading-none">Rob <br/> Reynolds</h2>
                            <p className="text-[8px] text-neutral-700 font-black tracking-[0.5em] border-b border-white/5 pb-6">Designer • Artist • Builder</p>
                        </div>
                        <div className="space-y-8 normal-text text-neutral-500 text-base leading-relaxed font-light">
                            <p>The practice exists at the intersection of material knowledge and digital possibility. It is interested in how tools shape creative output—whether that involves the physical grain of wood or the procedural logic of a voxel engine.</p>
                            <p>Building tools is an act of engineering for the sake of art. The goal is to design environments where complexity is managed by intuition, allowing for a direct connection between the creator and the form.</p>
                            <p>Based in Winnipeg, MB. Splitting time between freelance carpentry and digital tinkering. Most days are spent looking for form—whether that's through the grain of a piece of wood or the code behind a spatial engine.</p>
                        </div>
                        <div className="pt-10 border-t border-white/5">
                            <a href="mailto:rob@example.com" className="w-full flex justify-between items-center border border-white/10 py-10 px-12 hover:bg-white hover:text-black transition-all">
                                <span className="text-xs font-black tracking-[0.4em]">Establish_Contact</span> 
                                <Icon name="send" size={18} />
                            </a>
                        </div>
                    </div>
                </section>

                <div className="p-16 md:p-24 bg-neutral-900/10 border border-white/5 text-center space-y-12">
                    <div className="space-y-4">
                        <h3 className="text-3xl font-black text-white tracking-tighter">Project_Sustainability</h3>
                        <p className="text-xs text-neutral-600 max-w-lg mx-auto normal-text italic leading-relaxed">
                            "These tools and archives are maintained as open community resources. Support helps keep the engines running and the research moving forward."
                        </p>
                    </div>
                    <div className="flex justify-center">
                        <button className="bg-white text-black hover:bg-neutral-200 btn-sharp h-20 px-16 text-[10px] font-black tracking-[0.4em] shadow-2xl">Support_on_Kofi</button>
                    </div>
                </div>
            </div>
        );

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
