<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxTrotBravo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; color: #4facfe; }
        p { margin: 5px 0; font-size: 14px; color: #ddd; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <h1>VoxTrotBravo</h1>
        <p><b>Left Trigger:</b> Draw / Select | <b>Right Trigger:</b> Erase / Apply / Drag Sliders</p>
        <p><b>Grips:</b> Grab to Move, Scale & Rotate World</p>
        <p><b>A & B (Right):</b> Tools & Settings | <b>X & Y (Left):</b> Tool Options & Materials</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        // --- Configuration & Global State ---
        const VOXEL_SIZE = 0.05; 
        const CHUNK_SIZE = 32;   
        const CHUNK_VOL = CHUNK_SIZE * CHUNK_SIZE * CHUNK_SIZE;

        let totalActiveVoxels = 0;
        
        let activeTool = 'brush'; 
        let strokeMode = 'continuous'; 
        let brushShape = 'cube'; 
        let brushSize = 1; 
        let boxMode = 'shell'; 
        let sphereMode = 'shell';
        let wireWidth = 1; 
        let paintMode = 'brush'; 
        let exportMode = 'boxes'; 
        
        let planeOutline = true;
        let planeOutlineThick = 1;
        let planeFill = true;
        let planeGrid = true;
        let planeGridThick = 1;
        let planeDivU = 2;
        let planeDivV = 2;
        let planeThick = 1;
        
        let selectMode = 'box'; 
        let transformMode = 'move'; 
        let numCopies = 1; 
        let hasSelection = false;
        
        let baseSelection = [];
        let selectedVoxels = [];
        
        const selectionCenter = new THREE.Vector3();
        const selectionOffset = new THREE.Vector3();
        const dragStartCtrlPos = new THREE.Vector3();
        const dragStartOffset = new THREE.Vector3();
        
        let selectionRotX = 0;
        let selectionRotY = 0;
        let selectionRotZ = 0;
        let activeSliderDrag = null; 

        let activeMaterialType = 0; 
        let colorMode = 'solid'; 
        let brushColor = new THREE.Color(0x4facfe);
        let brushColor2 = new THREE.Color(0xff0055);
        let activeColorSlot = 1; 
        let shiftProgress = 0;
        let shiftDir = 1;
        const tempColorForDraw = new THREE.Color();
        
        let isVerticalLock = true;
        let mirrorX = false;
        let mirrorZ = false;
        
        let isPreviewingBox = false;
        let isPreviewingSphere = false;
        let isPreviewingPlane = false;
        let isPreviewingLineLeft = false;
        let isPreviewingLineRight = false;

        const drawStartPos = new THREE.Vector3();
        const lineStartLeft = new THREE.Vector3(Infinity, Infinity, Infinity);
        const lineStartRight = new THREE.Vector3(Infinity, Infinity, Infinity);

        let hoveredFillCoords = [];
        const lastHoveredVoxel = new THREE.Vector3(Infinity, Infinity, Infinity);

        // --- Performance & GC Optimization Pre-allocations ---
        const rotR = new THREE.Matrix4();
        const rotR_inv = new THREE.Matrix4();
        const selRotEuler = new THREE.Euler();
        const fillVisited = new Set();
        const fillQueue = [];
        const selVisited = new Set();
        const selQueue = [];
        const origMap = new Map();
        const tempMatrix = new THREE.Matrix4();
        const tempColor = new THREE.Color();
        const tempPos = new THREE.Vector3();
        const tempQuat = new THREE.Quaternion(); 
        const midPos = new THREE.Vector3();
        const currentHandVec = new THREE.Vector3(); 
        const panDelta = new THREE.Vector3();
        const queryColor = new THREE.Color();
        const targetQueryColor = new THREE.Color();
        const rightPointerPos = new THREE.Vector3();
        const leftPointerPos = new THREE.Vector3();

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;

        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        const gridHelper = new THREE.GridHelper(20, 40, 0x444444, 0x222222);
        gridHelper.position.y = -0.01; 
        gridHelper.matrixAutoUpdate = false;
        gridHelper.updateMatrix();
        worldGroup.add(gridHelper);

        // --- Material System & Chunk Engine ---
        const voxelGeometry = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE);
        
        const matSolid = new THREE.MeshLambertMaterial(); 
        const matGlass = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.35, depthWrite: false }); 
        const matEmission = new THREE.MeshBasicMaterial(); 
        
        const voxelMaterials = [matSolid, matGlass, matEmission];
        const chunks = new Map(); 

        class ChunkLayer {
            constructor(cx, cy, cz, material) {
                this.mesh = new THREE.InstancedMesh(voxelGeometry, material, CHUNK_VOL);
                this.mesh.matrixAutoUpdate = false;
                this.mesh.updateMatrix();
                this.mesh.visible = false; 
                this.mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                this.mesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(CHUNK_VOL * 3), 3);
                this.mesh.instanceColor.setUsage(THREE.DynamicDrawUsage);
                this.mesh.count = 0;
                this.mesh.boundingSphere = new THREE.Sphere(
                    new THREE.Vector3((cx * CHUNK_SIZE + CHUNK_SIZE / 2) * VOXEL_SIZE, (cy * CHUNK_SIZE + CHUNK_SIZE / 2) * VOXEL_SIZE, (cz * CHUNK_SIZE + CHUNK_SIZE / 2) * VOXEL_SIZE),
                    CHUNK_SIZE * VOXEL_SIZE * 0.87
                );
                worldGroup.add(this.mesh);

                this.voxelToIndex = new Uint16Array(CHUNK_VOL);
                this.voxelToIndex.fill(65535); 
                this.indexToLocal = new Uint16Array(CHUNK_VOL); 
                this.needsUpdate = false;
            }

            addVoxel(localIdx, worldPos, color) {
                if (this.voxelToIndex[localIdx] !== 65535) {
                    const instIdx = this.voxelToIndex[localIdx];
                    this.mesh.setColorAt(instIdx, color);
                    this.needsUpdate = true;
                } else {
                    const instIdx = this.mesh.count;
                    this.voxelToIndex[localIdx] = instIdx;
                    this.indexToLocal[instIdx] = localIdx;
                    tempMatrix.makeTranslation(worldPos.x, worldPos.y, worldPos.z);
                    this.mesh.setMatrixAt(instIdx, tempMatrix);
                    this.mesh.setColorAt(instIdx, color);
                    this.mesh.count++;
                    totalActiveVoxels++;
                    this.needsUpdate = true;
                }
            }

            removeVoxel(localIdx) {
                if (this.voxelToIndex[localIdx] !== 65535) {
                    const instIdxToRemove = this.voxelToIndex[localIdx];
                    const lastInstIdx = this.mesh.count - 1;

                    if (instIdxToRemove !== lastInstIdx) {
                        const lastLocalIdx = this.indexToLocal[lastInstIdx];
                        this.mesh.getMatrixAt(lastInstIdx, tempMatrix);
                        this.mesh.getColorAt(lastInstIdx, tempColor);
                        this.mesh.setMatrixAt(instIdxToRemove, tempMatrix);
                        this.mesh.setColorAt(instIdxToRemove, tempColor);
                        this.voxelToIndex[lastLocalIdx] = instIdxToRemove;
                        this.indexToLocal[instIdxToRemove] = lastLocalIdx;
                    }

                    this.voxelToIndex[localIdx] = 65535;
                    this.mesh.count--;
                    totalActiveVoxels--;
                    this.needsUpdate = true;
                }
            }

            updateBuffers() {
                if (this.needsUpdate) {
                    this.mesh.instanceMatrix.needsUpdate = true;
                    this.mesh.instanceColor.needsUpdate = true;
                    this.needsUpdate = false;
                    this.mesh.visible = this.mesh.count > 0;
                }
            }
        }

        class Chunk {
            constructor(cx, cy, cz) {
                this.cx = cx; this.cy = cy; this.cz = cz;
                this.layers = new Array(3).fill(null);
                this.voxelMatMap = new Int8Array(CHUNK_VOL);
                this.voxelMatMap.fill(-1);
            }

            addVoxel(lx, ly, lz, worldPos, color, matType) {
                const localIdx = lx + (ly * CHUNK_SIZE) + (lz * CHUNK_SIZE * CHUNK_SIZE);
                const currentMat = this.voxelMatMap[localIdx];
                if (currentMat !== -1 && currentMat !== matType) {
                    this.layers[currentMat].removeVoxel(localIdx);
                }
                if (!this.layers[matType]) {
                    this.layers[matType] = new ChunkLayer(this.cx, this.cy, this.cz, voxelMaterials[matType]);
                }
                this.voxelMatMap[localIdx] = matType;
                this.layers[matType].addVoxel(localIdx, worldPos, color);
            }

            removeVoxel(lx, ly, lz) {
                const localIdx = lx + (ly * CHUNK_SIZE) + (lz * CHUNK_SIZE * CHUNK_SIZE);
                const currentMat = this.voxelMatMap[localIdx];
                if (currentMat !== -1) {
                    this.layers[currentMat].removeVoxel(localIdx);
                    this.voxelMatMap[localIdx] = -1;
                }
            }

            updateBuffers() {
                for (let i = 0; i < 3; i++) {
                    if (this.layers[i]) this.layers[i].updateBuffers();
                }
            }
        }

        // --- Cursors, Selection & Previews ---
        const cursorLeftMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.5, wireframe: true });
        const cursorLeft = new THREE.Mesh(new THREE.BoxGeometry(), cursorLeftMat);
        worldGroup.add(cursorLeft);

        const cursorRightMat = new THREE.MeshBasicMaterial({ color: 0xff0055, transparent: true, opacity: 0.8, wireframe: true });
        const cursorRight = new THREE.Mesh(new THREE.BoxGeometry(), cursorRightMat);
        worldGroup.add(cursorRight);

        const boxPreviewMat = new THREE.MeshBasicMaterial({ color: 0x4facfe, transparent: true, opacity: 0.3, wireframe: false });
        const boxPreviewMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), boxPreviewMat);
        boxPreviewMesh.matrixAutoUpdate = false; boxPreviewMesh.visible = false;
        worldGroup.add(boxPreviewMesh);

        const spherePreviewMat = new THREE.MeshBasicMaterial({ color: 0x4facfe, transparent: true, opacity: 0.3, wireframe: true });
        const spherePreviewMesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), spherePreviewMat);
        spherePreviewMesh.matrixAutoUpdate = false; spherePreviewMesh.visible = false;
        worldGroup.add(spherePreviewMesh);

        const bucketPreviewMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4, depthTest: false });
        const bucketPreviewMesh = new THREE.InstancedMesh(voxelGeometry, bucketPreviewMat, 8000);
        bucketPreviewMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); bucketPreviewMesh.matrixAutoUpdate = false; bucketPreviewMesh.updateMatrix(); bucketPreviewMesh.visible = false;
        worldGroup.add(bucketPreviewMesh);

        const linePreviewMat = new THREE.MeshBasicMaterial({ color: 0x4facfe, transparent: true, opacity: 0.4, depthTest: false, depthWrite: false });
        const linePreviewMesh = new THREE.InstancedMesh(voxelGeometry, linePreviewMat, 15000);
        linePreviewMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); linePreviewMesh.matrixAutoUpdate = false; linePreviewMesh.updateMatrix(); linePreviewMesh.visible = false;
        worldGroup.add(linePreviewMesh);

        const selectionGroup = new THREE.Group();
        selectionGroup.visible = false;
        worldGroup.add(selectionGroup);

        const selMeshSolid = new THREE.InstancedMesh(voxelGeometry, matSolid, 65000); selMeshSolid.matrixAutoUpdate = false; selMeshSolid.updateMatrix(); selMeshSolid.instanceMatrix.setUsage(THREE.DynamicDrawUsage); selMeshSolid.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(65000 * 3), 3); selMeshSolid.instanceColor.setUsage(THREE.DynamicDrawUsage);
        const selMeshGlass = new THREE.InstancedMesh(voxelGeometry, matGlass, 65000); selMeshGlass.matrixAutoUpdate = false; selMeshGlass.updateMatrix(); selMeshGlass.instanceMatrix.setUsage(THREE.DynamicDrawUsage); selMeshGlass.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(65000 * 3), 3); selMeshGlass.instanceColor.setUsage(THREE.DynamicDrawUsage);
        const selMeshEmission = new THREE.InstancedMesh(voxelGeometry, matEmission, 65000); selMeshEmission.matrixAutoUpdate = false; selMeshEmission.updateMatrix(); selMeshEmission.instanceMatrix.setUsage(THREE.DynamicDrawUsage); selMeshEmission.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(65000 * 3), 3); selMeshEmission.instanceColor.setUsage(THREE.DynamicDrawUsage);
        selectionGroup.add(selMeshSolid); selectionGroup.add(selMeshGlass); selectionGroup.add(selMeshEmission);

        const selBoxMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.9 });
        const selBoxMesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), selBoxMat);
        selBoxMesh.matrixAutoUpdate = false;
        selectionGroup.add(selBoxMesh);

        const previewContainer = new THREE.Group();
        worldGroup.add(previewContainer);
        const previewGroups = [];

        function updatePreviews() {
            for (let i = 0; i < previewGroups.length; i++) previewGroups[i].visible = false;
            if (!hasSelection) return;

            let pIdx = 0;
            function getPreviewGroup(px, py, pz, sx, sy, sz) {
                if (pIdx >= previewGroups.length) {
                    const g = new THREE.Group();
                    g.matrixAutoUpdate = false;
                    const m1 = new THREE.InstancedMesh(voxelGeometry, matSolid, 65000); m1.matrixAutoUpdate = false; m1.updateMatrix();
                    const m2 = new THREE.InstancedMesh(voxelGeometry, matGlass, 65000); m2.matrixAutoUpdate = false; m2.updateMatrix();
                    const m3 = new THREE.InstancedMesh(voxelGeometry, matEmission, 65000); m3.matrixAutoUpdate = false; m3.updateMatrix();
                    const bMesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), selBoxMat); bMesh.matrixAutoUpdate = false;
                    g.add(m1); g.add(m2); g.add(m3); g.add(bMesh);
                    previewContainer.add(g);
                    previewGroups.push(g);
                }
                const g = previewGroups[pIdx];
                g.children[0].instanceMatrix = selMeshSolid.instanceMatrix; g.children[0].instanceColor = selMeshSolid.instanceColor; g.children[0].count = selMeshSolid.count; g.children[0].visible = selMeshSolid.visible;
                g.children[1].instanceMatrix = selMeshGlass.instanceMatrix; g.children[1].instanceColor = selMeshGlass.instanceColor; g.children[1].count = selMeshGlass.count; g.children[1].visible = selMeshGlass.visible;
                g.children[2].instanceMatrix = selMeshEmission.instanceMatrix; g.children[2].instanceColor = selMeshEmission.instanceColor; g.children[2].count = selMeshEmission.count; g.children[2].visible = selMeshEmission.visible;
                g.children[3].position.copy(selBoxMesh.position); g.children[3].scale.copy(selBoxMesh.scale); g.children[3].updateMatrix();
                g.position.set(px, py, pz); g.scale.set(sx, sy, sz); g.updateMatrix(); g.visible = true;
                pIdx++;
            }

            const steps = transformMode === 'copy' ? numCopies : 1;
            const offX = Math.round(selectionGroup.position.x / VOXEL_SIZE) * VOXEL_SIZE;
            const offY = Math.round(selectionGroup.position.y / VOXEL_SIZE) * VOXEL_SIZE;
            const offZ = Math.round(selectionGroup.position.z / VOXEL_SIZE) * VOXEL_SIZE;

            for (let step = 1; step <= steps; step++) {
                const cx = offX * step; const cy = offY * step; const cz = offZ * step;
                if (step > 1) getPreviewGroup(cx, cy, cz, 1, 1, 1);
                if (mirrorX) getPreviewGroup(-cx, cy, cz, -1, 1, 1);
                if (mirrorZ) getPreviewGroup(cx, cy, -cz, 1, 1, -1);
                if (mirrorX && mirrorZ) getPreviewGroup(-cx, cy, -cz, -1, 1, -1);
            }
        }

        const toolMirrorGroups = [];
        const mgX = new THREE.Group(); mgX.scale.set(-1, 1, 1); mgX.matrixAutoUpdate = false; mgX.updateMatrix(); worldGroup.add(mgX); toolMirrorGroups.push(mgX);
        const mgZ = new THREE.Group(); mgZ.scale.set(1, 1, -1); mgZ.matrixAutoUpdate = false; mgZ.updateMatrix(); worldGroup.add(mgZ); toolMirrorGroups.push(mgZ);
        const mgXZ = new THREE.Group(); mgXZ.scale.set(-1, 1, -1); mgXZ.matrixAutoUpdate = false; mgXZ.updateMatrix(); worldGroup.add(mgXZ); toolMirrorGroups.push(mgXZ);

        function createMirrorProxies(baseMesh) {
            const proxies = [];
            for (let i = 0; i < 3; i++) {
                let proxy;
                if (baseMesh.isInstancedMesh) {
                    proxy = new THREE.InstancedMesh(baseMesh.geometry, baseMesh.material, baseMesh.instanceMatrix.count);
                    proxy.instanceMatrix = baseMesh.instanceMatrix;
                    if (baseMesh.instanceColor) proxy.instanceColor = baseMesh.instanceColor;
                } else {
                    proxy = new THREE.Mesh(baseMesh.geometry, baseMesh.material);
                }
                proxy.matrixAutoUpdate = false; proxy.visible = false;
                toolMirrorGroups[i].add(proxy); proxies.push(proxy);
            }
            return proxies;
        }

        const cursorLeftMirrors = createMirrorProxies(cursorLeft);
        const cursorRightMirrors = createMirrorProxies(cursorRight);
        const boxPreviewMirrors = createMirrorProxies(boxPreviewMesh);
        const spherePreviewMirrors = createMirrorProxies(spherePreviewMesh);
        const bucketPreviewMirrors = createMirrorProxies(bucketPreviewMesh);
        const linePreviewMirrors = createMirrorProxies(linePreviewMesh);

        function syncMirrorProxies(baseMesh, proxies, showMirrors) {
            const isVisible = baseMesh.visible && showMirrors;
            proxies[0].visible = isVisible && mirrorX;
            proxies[1].visible = isVisible && mirrorZ;
            proxies[2].visible = isVisible && mirrorX && mirrorZ;

            if (isVisible) {
                for (let i=0; i<3; i++) {
                    if (proxies[i].visible) {
                        proxies[i].position.copy(baseMesh.position);
                        proxies[i].quaternion.copy(baseMesh.quaternion);
                        proxies[i].scale.copy(baseMesh.scale);
                        proxies[i].updateMatrix();
                        if (baseMesh.isInstancedMesh) proxies[i].count = baseMesh.count;
                    }
                }
            }
        }

        function updateCursors() {
            let effSize = brushSize;
            if (activeTool === 'box' || activeTool === 'quadsphere' || activeTool === 'select' || activeTool === 'plane' || (activeTool === 'paint' && paintMode === 'bucket')) {
                effSize = 1;
            }
            const width = ((effSize - 1) * 2 + 1) * VOXEL_SIZE;
            if (cursorLeft.geometry) cursorLeft.geometry.dispose();
            if (cursorRight.geometry) cursorRight.geometry.dispose();

            const isBoxShape = (brushShape === 'cube' || activeTool === 'box' || activeTool === 'select' || activeTool === 'quadsphere' || activeTool === 'plane' || (activeTool === 'paint' && paintMode === 'bucket'));
            const geo = isBoxShape ? new THREE.BoxGeometry(width, width, width) : new THREE.SphereGeometry(width / 2, 16, 16);
            
            cursorLeft.geometry = geo; cursorRight.geometry = geo;
            cursorLeftMirrors.forEach(m => m.geometry = geo); cursorRightMirrors.forEach(m => m.geometry = geo);

            const activeColor = activeColorSlot === 1 ? brushColor : brushColor2;
            cursorLeft.material.color.copy(activeColor);
        }
        updateCursors();

        function updateBoxPreview(start, end, isPainting) {
            boxPreviewMesh.visible = true;
            boxPreviewMesh.position.copy(start).add(end).multiplyScalar(0.5);
            const sizeX = Math.abs(end.x - start.x) + VOXEL_SIZE;
            const sizeY = Math.abs(end.y - start.y) + VOXEL_SIZE;
            const sizeZ = Math.abs(end.z - start.z) + VOXEL_SIZE;
            boxPreviewMesh.scale.set(sizeX, sizeY, sizeZ);
            boxPreviewMesh.updateMatrix();
            boxPreviewMat.wireframe = (boxMode === 'wireframe' && activeTool !== 'select');
            
            if (isPainting) {
                const activeColor = activeColorSlot === 1 ? brushColor : brushColor2;
                boxPreviewMat.color.copy(activeTool === 'select' ? new THREE.Color(0x00ffcc) : activeColor);
            } else boxPreviewMat.color.setHex(0xff0055);
        }

        function updatePlanePreview(start, end, isPainting) {
            boxPreviewMesh.visible = true;
            const gStartX = Math.round(start.x / VOXEL_SIZE) * VOXEL_SIZE; const gStartY = Math.round(start.y / VOXEL_SIZE) * VOXEL_SIZE; const gStartZ = Math.round(start.z / VOXEL_SIZE) * VOXEL_SIZE;
            const gEndX = Math.round(end.x / VOXEL_SIZE) * VOXEL_SIZE; const gEndY = Math.round(end.y / VOXEL_SIZE) * VOXEL_SIZE; const gEndZ = Math.round(end.z / VOXEL_SIZE) * VOXEL_SIZE;
            let minX = Math.min(gStartX, gEndX); let maxX = Math.max(gStartX, gEndX);
            let minY = Math.min(gStartY, gEndY); let maxY = Math.max(gStartY, gEndY);
            let minZ = Math.min(gStartZ, gEndZ); let maxZ = Math.max(gStartZ, gEndZ);

            const dx = maxX - minX; const dy = maxY - minY; const dz = maxZ - minZ;
            let flatAxis = 'y';
            if (dx <= dy && dx <= dz) flatAxis = 'x';
            else if (dz <= dx && dz <= dy) flatAxis = 'z';

            const depthSize = (planeThick - 1) * VOXEL_SIZE;
            if (flatAxis === 'x') { minX = Math.min(gStartX, gEndX); maxX = minX + depthSize; }
            if (flatAxis === 'y') { minY = Math.min(gStartY, gEndY); maxY = minY + depthSize; }
            if (flatAxis === 'z') { minZ = Math.min(gStartZ, gEndZ); maxZ = minZ + depthSize; }

            boxPreviewMesh.position.set(minX + maxX, minY + maxY, minZ + maxZ).multiplyScalar(0.5);
            const sizeX = Math.abs(maxX - minX) + VOXEL_SIZE; const sizeY = Math.abs(maxY - minY) + VOXEL_SIZE; const sizeZ = Math.abs(maxZ - minZ) + VOXEL_SIZE;
            boxPreviewMesh.scale.set(sizeX, sizeY, sizeZ);
            boxPreviewMesh.updateMatrix();
            boxPreviewMat.wireframe = false;
            
            if (isPainting) boxPreviewMat.color.copy(activeColorSlot === 1 ? brushColor : brushColor2);
            else boxPreviewMat.color.setHex(0xff0055);
        }

        function updateSpherePreview(start, end, isPainting) {
            spherePreviewMesh.visible = true;
            spherePreviewMesh.position.copy(start).add(end).multiplyScalar(0.5);
            const sizeX = Math.abs(end.x - start.x) + VOXEL_SIZE; const sizeY = Math.abs(end.y - start.y) + VOXEL_SIZE; const sizeZ = Math.abs(end.z - start.z) + VOXEL_SIZE;
            spherePreviewMesh.scale.set(sizeX, sizeY, sizeZ);
            spherePreviewMesh.updateMatrix();
            spherePreviewMat.wireframe = (sphereMode === 'shell');
            
            if (isPainting) {
                const activeColor = activeColorSlot === 1 ? brushColor : brushColor2;
                spherePreviewMat.color.copy(activeColor);
            } else spherePreviewMat.color.setHex(0xff0055);
        }

        // --- PCVR ROBUST CONTROLLER SETUP ---
        let xrRight = null; let xrLeft = null;
        let gripRight = null; let gripLeft = null;

        const controller0 = renderer.xr.getController(0);
        const controller1 = renderer.xr.getController(1);
        const grip0 = renderer.xr.getControllerGrip(0);
        const grip1 = renderer.xr.getControllerGrip(1);

        scene.add(controller0); scene.add(controller1);
        scene.add(grip0); scene.add(grip1);

        const raycaster = new THREE.Raycaster();
        
        const leftLaserLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)]), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));

                }

                // Robust Grip Locomotion

                if (gripLeft) gripLeft.getWorldPosition(leftPos);

                if (isRightGripping && isLeftGripping && gripRight && gripLeft) {
                    const dist = rightPos.distanceTo(leftPos); midPos.copy(rightPos).lerp(leftPos, 0.5); currentHandVec.subVectors(rightPos, leftPos).normalize();
                    if (prevGripDist > 0 && prevHandVec.lengthSq() > 0) {

                            if (pXZ.lengthSq() > 0.001 && cXZ.lengthSq() > 0.001) tempQuat.setFromUnitVectors(pXZ.normalize(), cXZ.normalize()); else tempQuat.identity();
                        } else tempQuat.setFromUnitVectors(prevHandVec, currentHandVec);

                        worldGroup.scale.multiplyScalar(scaleDelta); worldGroup.position.applyQuaternion(tempQuat); worldGroup.quaternion.premultiply(tempQuat); worldGroup.position.add(midPos);

                        if (gx !== lastHoveredVoxel.x || gy !== lastHoveredVoxel.y || gz !== lastHoveredVoxel.z) {

                            for (let i = 0; i < hoveredFillCoords.length; i+=3) { if (hoveredFillCoords[i] === gx && hoveredFillCoords[i+1] === gy && hoveredFillCoords[i+2] === gz) { alreadyInRegion = true; break; } }
                            if (!alreadyInRegion) {
                                lastHoveredVoxel.set(gx, gy, gz); calculateFloodFill(gx, gy, gz); const pointsFound = hoveredFillCoords.length / 3;
                                if (pointsFound > 0) {

                                    for (let i = 0; i < pointsFound; i++) { tempMatrix.makeTranslation(hoveredFillCoords[i*3] * VOXEL_SIZE, hoveredFillCoords[i*3+1] * VOXEL_SIZE, hoveredFillCoords[i*3+2] * VOXEL_SIZE); bucketPreviewMesh.setMatrixAt(i, tempMatrix); }

                    } else { bucketPreviewMesh.visible = false; if (activeTool !== 'paint' || paintMode !== 'bucket') { lastHoveredVoxel.set(Infinity, Infinity, Infinity); hoveredFillCoords.length = 0; } }

                    if (isDrawing) {
                        if (activeTool === 'select' && hasSelection) {
                            selectionOffset.copy(leftTargetLocal).sub(dragStartCtrlPos);
                            selectionOffset.set(Math.round(selectionOffset.x / VOXEL_SIZE) * VOXEL_SIZE, Math.round(selectionOffset.y / VOXEL_SIZE) * VOXEL_SIZE, Math.round(selectionOffset.z / VOXEL_SIZE) * VOXEL_SIZE);
                            selectionGroup.position.copy(dragStartOffset).add(selectionOffset); selectionGroup.updateMatrix();
                        } else if (activeTool === 'select' && selectMode === 'box' && isPreviewingBox) updateBoxPreview(drawStartPos, leftTargetLocal, true);
                        else if (activeTool === 'brush') { if (!leftTargetLocal.equals(lastPaintedPos)) { placeBrushVoxels(leftTargetLocal, true); lastPaintedPos.copy(leftTargetLocal); } }
                        else if (activeTool === 'paint' && paintMode === 'brush') { if (lastPaintedPos.x === Infinity) { placePaintVoxels(leftTargetLocal); lastPaintedPos.copy(leftTargetLocal); } else if (!leftTargetLocal.equals(lastPaintedPos)) { drawPaintLineVoxels(lastPaintedPos, leftTargetLocal); lastPaintedPos.copy(leftTargetLocal); } }
                        else if (activeTool === 'box' && isPreviewingBox) updateBoxPreview(drawStartPos, leftTargetLocal, true);
                        else if (activeTool === 'quadsphere' && isPreviewingSphere) updateSpherePreview(drawStartPos, leftTargetLocal, true);
                        else if (activeTool === 'plane' && isPreviewingPlane) updatePlanePreview(drawStartPos, leftTargetLocal, true);
                    }
                } else cursorLeft.visible = false;

                if (xrRight) {
                    xrRight.getWorldDirection(rightDir); xrRight.getWorldPosition(rightPointerPos); rightTargetLocal.copy(rightPointerPos).addScaledVector(rightDir, -0.05); worldGroup.worldToLocal(rightTargetLocal);
                    rightTargetLocal.set(Math.round(rightTargetLocal.x / VOXEL_SIZE) * VOXEL_SIZE, Math.round(rightTargetLocal.y / VOXEL_SIZE) * VOXEL_SIZE, Math.round(rightTargetLocal.z / VOXEL_SIZE) * VOXEL_SIZE);
                    cursorRight.position.copy(rightTargetLocal); cursorRight.updateMatrix(); cursorRight.visible = true;

                    if (isErasing && !isColorPicking) {

                        else if (activeTool === 'box' && isPreviewingBox) updateBoxPreview(drawStartPos, rightTargetLocal, false);
                        else if (activeTool === 'quadsphere' && isPreviewingSphere) updateSpherePreview(drawStartPos, rightTargetLocal, false);
                        else if (activeTool === 'plane' && isPreviewingPlane) updatePlanePreview(drawStartPos, rightTargetLocal, false);

                        if (isPreviewingLineLeft || isPreviewingLineRight) {
                            const startPos = isPreviewingLineLeft ? lineStartLeft : lineStartRight; const endPos = isPreviewingLineLeft ? leftTargetLocal : rightTargetLocal; const isPainting = isPreviewingLineLeft;
                            const steps = Math.min(300, Math.max(1, Math.ceil(startPos.distanceTo(endPos) / (VOXEL_SIZE * 0.25)))); 
                            let instCount = 0; const r = brushSize - 1; const rSq = (r + 0.1) * (r + 0.1); 
                            fillVisited.clear();
                            for (let i = 0; i <= steps; i++) {
                                tempPos.lerpVectors(startPos, endPos, i / steps); const cx = Math.round(tempPos.x / VOXEL_SIZE); const cy = Math.round(tempPos.y / VOXEL_SIZE); const cz = Math.round(tempPos.z / VOXEL_SIZE);
                                for (let dx = -r; dx <= r; dx++) for (let dy = -r; dy <= r; dy++) for (let dz = -r; dz <= r; dz++) {
                                    if (brushShape === 'sphere' && (dx*dx + dy*dy + dz*dz > rSq)) continue;
                                    const hash = (cx+dx + 32768) + (cy+dy + 32768) * 65536 + (cz+dz + 32768) * 4294967296;
                                    if (!fillVisited.has(hash)) { fillVisited.add(hash); if (instCount < 15000) { tempMatrix.makeTranslation((cx+dx)*VOXEL_SIZE, (cy+dy)*VOXEL_SIZE, (cz+dz)*VOXEL_SIZE); linePreviewMesh.setMatrixAt(instCount, tempMatrix); instCount++; } }
                                }
                            }
                            linePreviewMesh.count = instCount; linePreviewMesh.instanceMatrix.needsUpdate = true;
                            if (isPainting) linePreviewMat.color.copy(activeColorSlot === 1 ? brushColor : brushColor2); else linePreviewMat.color.setHex(0xff0055);
                            linePreviewMesh.visible = true;
                        } else linePreviewMesh.visible = false;
                    } else linePreviewMesh.visible = false;
                } else cursorRight.visible = false;

                if (hasSelection) updatePreviews(); else if (previewGroups.length > 0 && previewGroups[0].visible) for (let i = 0; i < previewGroups.length; i++) previewGroups[i].visible = false;

                const showToolMirrors = activeTool !== 'select';
                syncMirrorProxies(cursorLeft, cursorLeftMirrors, showToolMirrors); syncMirrorProxies(cursorRight, cursorRightMirrors, showToolMirrors && !isColorPicking);
                syncMirrorProxies(boxPreviewMesh, boxPreviewMirrors, showToolMirrors); syncMirrorProxies(spherePreviewMesh, spherePreviewMirrors, showToolMirrors);
                syncMirrorProxies(bucketPreviewMesh, bucketPreviewMirrors, showToolMirrors); syncMirrorProxies(linePreviewMesh, linePreviewMirrors, showToolMirrors);

                chunks.forEach(chunk => chunk.updateBuffers());
            }
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
