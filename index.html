        :root {

        // --- Data Definitions ---

        const BLENDER_SCRIPTS = [
            {
                id: 'standard',
                title: "Standard PBR Mapping",
                description: "Cleans up multi-material OBJ imports. Configures full PBR node setups including Subsurface Scattering, Micro-surface Bump, and Beveled Glass for all VoxTrot material types.",
                code: `import bpy\n\ndef process_voxel_mesh():\n    \"\"\"\n    Cleans up the multi-material imported OBJ generated by 'VoxTrotBravo'.\n    Updated for Blender 5.0+ API and EEVEE Next / Cycles node structures.\n    Upgraded with full PBR (Physically Based Rendering) node setups including\n    Subsurface Scattering, Micro-surface Bump, and Beveled Glass.\n    \"\"\"\n    \n    selected_objects = [o for o in bpy.context.selected_objects if o.type == 'MESH']\n    \n    if not selected_objects:\n        print(\"Error: Please select the imported Voxel OBJ mesh(es) first.\")\n        return\n\n    print(f\"Starting cleanup and PBR material mapping on {len(selected_objects)} selected object(s)... text-left\")\n\n    # Join objects if multiple are imported (Blender OBJ importer splits by material groups)\n    bpy.context.view_layer.objects.active = selected_objects[0]\n    if len(selected_objects) > 1:\n        bpy.ops.object.join()\n        \n    obj = bpy.context.active_object\n\n    # --- 1. Geometry Processing (Base Cleanup Only) ---\n    bpy.context.view_layer.objects.active = obj\n    \n    # Determine if this was exported as Mesh (Triangles) or Boxes (Quads) dynamically\n    is_mesh_mode = False\n    if len(obj.data.polygons) > 0:\n        if len(obj.data.polygons[0].vertices) == 3:\n            is_mesh_mode = True\n            \n    if is_mesh_mode:\n        print(\"Mesh mode detected. Merging vertices using optimized C-level operator.\")\n        bpy.ops.object.mode_set(mode='EDIT')\n        bpy.ops.mesh.select_all(action='SELECT')\n        bpy.ops.mesh.remove_doubles(threshold=0.001)\n        bpy.ops.object.mode_set(mode='OBJECT')\n    else:\n        print(\"Boxes mode detected. Leaving geometry as distinct un-merged voxel blocks.\")\n        \n    # OPTIMIZATION: Use C-level 'foreach_set' to apply flat shading to the main grid instantly\n    poly_count = len(obj.data.polygons)\n    if poly_count > 0:\n        obj.data.polygons.foreach_set('use_smooth', [False] * poly_count)\n\n    # --- Enable Shadow Caustics (Cycles 3.2+) ---\n    try:\n        obj.is_caustics_caster = True\n        obj.is_caustics_receiver = True\n    except AttributeError:\n        pass\n\n    # --- 2. Material Mapping based on OBJ groupings ---\n    for mat in obj.data.materials:\n        if not mat: continue\n        \n        print(f\"Processing PBR material group: {mat.name}\")\n        mat.use_nodes = True\n        nodes = mat.node_tree.nodes\n        links = mat.node_tree.links\n\n        # Clear existing nodes\n        nodes.clear()\n\n        # Build Standard Core Nodes\n        out_node = nodes.new(type='ShaderNodeOutputMaterial')\n        out_node.location = (600, 0)\n\n        bsdf_node = nodes.new(type='ShaderNodeBsdfPrincipled')\n        bsdf_node.location = (200, 0)\n\n        attr_node = nodes.new(type='ShaderNodeAttribute')\n        attr_node.location = (-150, 200)\n        \n        # Pull standard vertex color naming\n        color_attrs = obj.data.color_attributes\n        attr_node.attribute_name = color_attrs[0].name if color_attrs else \"Color\"\n\n        # Standard linking\n        links.new(bsdf_node.outputs['BSDF'], out_node.inputs['Surface'])\n\n        # Contextual Material Routing (Blender 4.0 / 5.0+ Principled BSDF structure)\n        if \"Solid\" in mat.name:\n            # 1. Base Color\n            links.new(attr_node.outputs['Color'], bsdf_node.inputs['Base Color'])\n            \n            # 2. Plastic/Resin Sheen (PBR Roughness)\n            bsdf_node.inputs['Roughness'].default_value = 0.35 \n            \n            # 3. Subsurface Scattering (Vital for Photorealism in Voxels)\n            if 'Subsurface Weight' in bsdf_node.inputs:\n                bsdf_node.inputs['Subsurface Weight'].default_value = 0.15\n            elif 'Subsurface' in bsdf_node.inputs:\n                bsdf_node.inputs['Subsurface'].default_value = 0.15\n                \n            # 4. Micro-surface Detail (Plastic Grain)\n            noise_node = nodes.new(type='ShaderNodeTexNoise')\n            noise_node.location = (-550, -100)\n            noise_node.inputs['Scale'].default_value = 250.0 # Fine grain\n            noise_node.inputs['Detail'].default_value = 2.0\n            \n            bump_node = nodes.new(type='ShaderNodeBump')\n            bump_node.location = (-350, -100)\n            bump_node.inputs['Strength'].default_value = 0.04 # Subtle depth\n            bump_node.inputs['Distance'].default_value = 0.1\n            links.new(noise_node.outputs['Fac'], bump_node.inputs['Height'])\n            \n            # 5. Bevel (Soft Edges)\n            bevel_node = nodes.new(type='ShaderNodeBevel')\n            bevel_node.location = (-150, -100)\n            bevel_node.samples = 6\n            bevel_node.inputs['Radius'].default_value = 0.008 # Realistic edge rounding\n            \n            # 6. Stack the Normals: Micro-Bump -> Bevel -> Principled BSDF\n            links.new(bump_node.outputs['Normal'], bevel_node.inputs['Normal'])\n            links.new(bevel_node.outputs['Normal'], bsdf_node.inputs['Normal'])\n\n        elif \"Glass\" in mat.name:\n            # 1. Base Color & Real Glass Properties\n            links.new(attr_node.outputs['Color'], bsdf_node.inputs['Base Color'])\n            bsdf_node.inputs['Roughness'].default_value = 0.08 # Clean, slightly frosted finish\n            \n            if 'IOR' in bsdf_node.inputs:\n                bsdf_node.inputs['IOR'].default_value = 1.45 # Standard for glass/acrylic\n            \n            if 'Transmission Weight' in bsdf_node.inputs:\n                bsdf_node.inputs['Transmission Weight'].default_value = 1.0\n            elif 'Transmission' in bsdf_node.inputs:\n                bsdf_node.inputs['Transmission'].default_value = 1.0\n                \n            # 2. Beveled Edges for Glass (Crucial for edge-catching light reflections)\n            bevel_node = nodes.new(type='ShaderNodeBevel')\n            bevel_node.location = (-150, -100)\n            bevel_node.samples = 6\n            bevel_node.inputs['Radius'].default_value = 0.005\n            links.new(bevel_node.outputs['Normal'], bsdf_node.inputs['Normal'])\n                \n            # Legacy/EEVEE compatibility adjustments\n            try:\n                mat.blend_method = 'BLEND'\n                mat.shadow_method = 'HASHED' \n            except AttributeError:\n                pass \n\n        elif \"Emission\" in mat.name:\n            # Set Base Color to black so the geometry acts strictly as a pure light emitter\n            bsdf_node.inputs['Base Color'].default_value = (0, 0, 0, 1) \n            \n            # Blender 4.0+ separated Emission Color and Strength\n            if 'Emission Color' in bsdf_node.inputs:\n                links.new(attr_node.outputs['Color'], bsdf_node.inputs['Emission Color'])\n                if 'Emission Strength' in bsdf_node.inputs:\n                    bsdf_node.inputs['Emission Strength'].default_value = 10.0\n            else:\n                links.new(attr_node.outputs['Color'], bsdf_node.inputs['Emission'])\n\n    # --- 3. Viewport Update ---\n    for area in bpy.context.screen.areas:\n        if area.type == 'VIEW_3D':\n            for space in area.spaces:\n                if space.type == 'VIEW_3D':\n                    space.shading.type = 'MATERIAL'\n\n    # Ensure context updates to reflect shader modifications instantly\n    bpy.context.view_layer.update()\n    \n    print(f\"Success! Optimized {obj.name} with PBR-Ready node trees. Render in Cycles for best results!\")\n\nif __name__ == \"__main__\":\n    process_voxel_mesh()`
            },
            {
                id: 'jumbo',
                title: "Massive Voxel Optimizer",
                description: "Designed for datasets exceeding 10M+ voxels. Uses data-level updates instead of operators and conditionally skips heavy merging to prevent system crashes.",
                code: `import bpy\nimport time\n\ndef process_massive_voxel_mesh():\n    \"\"\"\n    High-Performance Voxel Cleanup for Blender 5.0+\n    Designed for datasets exceeding 10M+ voxels.\n    - Uses 'Data-Level' updates instead of 'Operator-Level' (UI) calls.\n    - Conditionally skips memory-heavy merging for extreme counts.\n    - Simplified PBR tree to prevent Cycles kernel crashes.\n    - Support for Solid, Glass, Emission, and Metal material types.\n    \"\"\"\n    \n    # 1. Performance Thresholds\n    # If poly count exceeds this, we skip \"Remove Doubles\" to prevent RAM crashes\n    MERGE_THRESHOLD = 2000000 \n    # If poly count exceeds this, we skip the Bevel node (expensive render-time effect)\n    BEVEL_THRESHOLD = 5000000 \n\n    selected_objects = [o for o in bpy.context.selected_objects if o.type == 'MESH']\n    \n    if not selected_objects:\n        print(\"Error: No Mesh objects selected. Please select your imported OBJ.\")\n        return\n\n    start_time = time.time()\n    print(f\"--- Starting High-Performance Process on {len(selected_objects)} objects ---\")\n\n    # Join objects using the most efficient context\n    if len(selected_objects) > 1:\n        print(f\"Joining {len(selected_objects)} parts into one mesh...\")\n        bpy.context.view_layer.objects.active = selected_objects[0]\n        bpy.ops.object.join()\n        \n    obj = bpy.context.active_object\n    poly_count = len(obj.data.polygons)\n    print(f\"Total Polygon Count: {poly_count:,}\")\n\n    # --- 2. Optimized Geometry Processing ---\n    # We avoid Edit Mode operators (bpy.ops.mesh.*) where possible for massive meshes\n    \n    if poly_count < MERGE_THRESHOLD:\n        print(\"Model size within merge limits. Cleaning up geometry...\")\n        bpy.ops.object.mode_set(mode='EDIT')\n        bpy.ops.mesh.remove_doubles(threshold=0.0001)\n        bpy.ops.object.mode_set(mode='OBJECT')\n    else:\n        print(\"WARNING: Poly count too high for merging. Skipping 'Remove Doubles' to save RAM.\")\n\n    # Optimized Flat Shading (Fastest way to set shading in Blender 5.0)\n    obj.data.polygons.foreach_set('use_smooth', [False] * poly_count)\n\n    # --- 3. Memory-Efficient PBR Material Setup ---\n    # We reuse a single Material tree structure where possible\n    \n    for mat in obj.data.materials:\n        if not mat: continue\n        \n        print(f\"Optimizing material: {mat.name}\")\n        mat.use_nodes = True\n        nodes = mat.node_tree.nodes\n        links = mat.node_tree.links\n        nodes.clear()\n\n        # Core Node Creation\n        out_node = nodes.new('ShaderNodeOutputMaterial')\n        out_node.location = (400, 0)\n\n        bsdf = nodes.new('ShaderNodeBsdfPrincipled')\n        bsdf.location = (0, 0)\n        links.new(bsdf.outputs['BSDF'], out_node.inputs['Surface'])\n\n        # Vertex Color Access (Essential for VoxTrotBravo imports)\n        attr = nodes.new('ShaderNodeAttribute')\n        attr.location = (-300, 100)\n        \n        # In Blender 5.0, color attributes are standard\n        color_attr = obj.data.color_attributes.active\n        attr.attribute_name = color_attr.name if color_attr else \"Color\"\n        links.new(attr.outputs['Color'], bsdf.inputs['Base Color'])\n\n        # Material Logic based on Material Name (Matching VoxTrotBravo Export Types)\n        if \"Solid\" in mat.name:\n            bsdf.inputs['Roughness'].default_value = 0.4\n            \n            if poly_count < BEVEL_THRESHOLD:\n                if 'Subsurface Weight' in bsdf.inputs:\n                    bsdf.inputs['Subsurface Weight'].default_value = 0.05\n                \n                # Add Bevel for subtle edge highlights\n                bevel = nodes.new('ShaderNodeBevel')\n                bevel.location = (-300, -200)\n                bevel.samples = 4\n                bevel.inputs['Radius'].default_value = 0.005\n                links.new(bevel.outputs['Normal'], bsdf.inputs['Normal'])\n\n        elif \"Metal\" in mat.name:\n            bsdf.inputs['Metallic'].default_value = 1.0\n            bsdf.inputs['Roughness'].default_value = 0.2\n\n        elif \"Glass\" in mat.name:\n            if 'Transmission Weight' in bsdf.inputs:\n                bsdf.inputs['Transmission Weight'].default_value = 1.0\n            bsdf.inputs['Roughness'].default_value = 0.05\n            bsdf.inputs['IOR'].default_value = 1.45\n            \n            # Legacy/Compatibility adjustments for Viewport Transparency\n            try:\n                mat.blend_method = 'HASHED'\n                # shadow_method is removed in Blender 4.2+ (EEVEE Next)\n                if bpy.app.version < (4, 2, 0):\n                    mat.shadow_method = 'HASHED'\n            except AttributeError:\n                pass\n\n        elif \"Emission\" in mat.name:\n            bsdf.inputs['Base Color'].default_value = (0, 0, 0, 1)\n            links.new(attr.outputs['Color'], bsdf.inputs['Emission Color'])\n            if 'Emission Strength' in bsdf.inputs:\n                bsdf.inputs['Emission Strength'].default_value = 10.0\n\n    # --- 4. Cycles Performance & Viewport Setup ---\n    bpy.context.scene.render.engine = 'CYCLES'\n    \n    # Fast BVH Build setup\n    if hasattr(bpy.context.scene.cycles, \"debug_use_spatial_splits\"):\n        bpy.context.scene.cycles.debug_use_spatial_splits = False\n        \n    # Corrected: Disable Caustics (Properties are found in obj.cycles)\n    try:\n        obj.cycles.is_caustics_caster = False\n        obj.cycles.is_caustics_receiver = False\n    except AttributeError:\n        # Fallback if Cycles properties aren't initialized or available\n        pass\n\n    # Force Viewport to show Material colors so user sees result instantly\n    for area in bpy.context.screen.areas:\n        if area.type == 'VIEW_3D':\n            for space in area.spaces:\n                if space.type == 'VIEW_3D':\n                    space.shading.type = 'MATERIAL'\n\n    end_time = time.time()\n    print(f\"--- SUCCESS: Processed {poly_count:,} polygons in {round(end_time - start_time, 2)}s ---\")\n\nif __name__ == \"__main__\":\n    process_massive_voxel_mesh()`
            },
            {
                id: 'smooth',
                title: "Voxel-to-Smooth Remesher",
                description: "Automates the process of remeshing and smoothing while preserving vertex attributes via Geometry Nodes projection. Includes an UberMaterial for mask-driven PBR.",
                code: `import bpy\nimport bmesh\n\ndef get_color_attribute_name(obj):\n    \"\"\"Finds the name of the active or first color attribute on the object.\"\"\"\n    if obj.data.color_attributes:\n        return obj.data.color_attributes.active.name if obj.data.color_attributes.active else obj.data.color_attributes[0].name\n    return \"Color\"\n\ndef create_smooth_uber_material(color_attr_name):\n    \"\"\"\n    Creates a single high-performance Cycles/EEVEE material.\n    Uses attributes to drive PBR properties.\n    \"\"\"\n    mat_name = \"Smooth_Voxel_UberMaterial\"\n    mat = bpy.data.materials.get(mat_name)\n    if not mat:\n        mat = bpy.data.materials.new(name=mat_name)\n    \n    mat.use_nodes = True\n    nodes = mat.node_tree.nodes\n    links = mat.node_tree.links\n    nodes.clear()\n\n    # Create Nodes\n    out_node = nodes.new(type='ShaderNodeOutputMaterial')\n    bsdf = nodes.new(type='ShaderNodeBsdfPrincipled')\n    \n    # Color Attribute (Dynamic Name)\n    color_attr = nodes.new(type='ShaderNodeAttribute')\n    color_attr.attribute_name = color_attr_name\n    \n    # Material Mask Attribute (Manual Name)\n    mask_attr = nodes.new(type='ShaderNodeAttribute')\n    mask_attr.attribute_name = \"MatMask\"\n\n    # Split Mask (R=Metal, G=Glass, B=Emission)\n    sep = nodes.new(type='ShaderNodeSeparateColor')\n    links.new(mask_attr.outputs['Color'], sep.inputs['Color'])\n\n    # --- Routing ---\n    # 1. Base Color\n    links.new(color_attr.outputs['Color'], bsdf.inputs['Base Color'])\n    \n    # 2. Metallic (Red Channel)\n    links.new(sep.outputs['Red'], bsdf.inputs['Metallic'])\n    \n    # 3. Transmission (Green Channel)\n    # Blender 4.0+ / 5.0 uses 'Transmission Weight'\n    t_attr = 'Transmission Weight' if 'Transmission Weight' in bsdf.inputs else 'Transmission'\n    links.new(sep.outputs['Green'], bsdf.inputs[t_attr])\n    \n    # 4. Emission (Blue Channel)\n    emit_mul = nodes.new(type='ShaderNodeMix')\n    emit_mul.data_type = 'RGBA'\n    emit_mul.blend_type = 'MULTIPLY'\n    emit_mul.inputs['Factor'].default_value = 1.0\n    \n    links.new(color_attr.outputs['Color'], emit_mul.inputs['A'])\n    links.new(sep.outputs['Blue'], emit_mul.inputs['B'])\n    \n    if 'Emission Color' in bsdf.inputs:\n        links.new(emit_mul.outputs['Result'], bsdf.inputs['Emission Color'])\n        bsdf.inputs['Emission Strength'].default_value = 15.0\n    else:\n        links.new(emit_mul.outputs['Result'], bsdf.inputs['Emission'])\n\n    # 5. Roughness tweaks based on mask\n    rough_mix = nodes.new(type='ShaderNodeMix')\n    rough_mix.data_type = 'FLOAT'\n    rough_mix.blend_type = 'MIX'\n    \n    math_max = nodes.new(type='ShaderNodeMath')\n    math_max.operation = 'MAXIMUM'\n    links.new(sep.outputs['Red'], math_max.inputs[0])\n    links.new(sep.outputs['Green'], math_max.inputs[1])\n    \n    links.new(math_max.outputs['Value'], rough_mix.inputs['Factor'])\n    rough_mix.inputs[2].default_value = 0.5 # Solid Roughness\n    rough_mix.inputs[3].default_value = 0.05 # Metal/Glass Roughness\n    links.new(rough_mix.outputs[0], bsdf.inputs['Roughness'])\n\n    links.new(bsdf.outputs['BSDF'], out_node.inputs['Surface'])\n    \n    return mat\n\ndef convert_voxels_to_smooth():\n    selected = [o for o in bpy.context.selected_objects if o.type == 'MESH']\n    if not selected: return\n\n    # 1. Source Prep\n    bpy.context.view_layer.objects.active = selected[0]\n    if len(selected) > 1: bpy.ops.object.join()\n    \n    source_obj = bpy.context.active_object\n    color_attr_name = get_color_attribute_name(source_obj)\n\n    # 2. Target Creation\n    bpy.ops.object.duplicate()\n    target_obj = bpy.context.active_object\n\n    remesh = target_obj.modifiers.new(name=\"Remesh\", type='REMESH')\n    remesh.mode = 'VOXEL'\n    remesh.voxel_size = 0.04\n    \n    smooth = target_obj.modifiers.new(name=\"Smooth\", type='SMOOTH')\n    smooth.iterations = 40\n    \n    # Apply geometry changes\n    bpy.ops.object.modifier_apply(modifier=\"Remesh\")\n    bpy.ops.object.modifier_apply(modifier=\"Smooth\")\n\n    # 4. Final Shading\n    target_obj.data.materials.clear()\n    uber_mat = create_smooth_uber_material(color_attr_name)\n    target_obj.data.materials.append(uber_mat)\n    \n    bpy.ops.object.shade_smooth()\n    print(\"Smoothing complete.\")\n\nif __name__ == \"__main__\":\n    convert_voxels_to_smooth()`
            }
        ];

            { id: 'g14', title: "Ico Platonic", type: "Geometric Solid", thumb: "images/vox-ico1-thumb.webp", full: "images/vox-ico1-full.webp" },
