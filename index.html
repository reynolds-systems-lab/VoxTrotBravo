                cursorLeft.position.copy(leftTargetLocal);
                cursorLeft.updateMatrix();
                
                if (activeTool === 'paint' && paintMode === 'bucket' && !isDrawing) {
                    const gx = Math.round(leftTargetLocal.x / VOXEL_SIZE);
                    const gy = Math.round(leftTargetLocal.y / VOXEL_SIZE);
                    const gz = Math.round(leftTargetLocal.z / VOXEL_SIZE);
                    
                    if (gx !== lastHoveredVoxel.x || gy !== lastHoveredVoxel.y || gz !== lastHoveredVoxel.z) {
                        
                        let alreadyInRegion = false;
                        for (let i = 0; i < hoveredFillCoords.length; i+=3) {
                            if (hoveredFillCoords[i] === gx && hoveredFillCoords[i+1] === gy && hoveredFillCoords[i+2] === gz) {
                                alreadyInRegion = true;
                                break;
                            }
                        }

                        if (!alreadyInRegion) {
                            lastHoveredVoxel.set(gx, gy, gz);
                            calculateFloodFill(gx, gy, gz);

                            const pointsFound = hoveredFillCoords.length / 3;
                            if (pointsFound > 0) {
                                bucketPreviewMesh.count = pointsFound;
                                for (let i = 0; i < pointsFound; i++) {
                                    tempMatrix.makeTranslation(hoveredFillCoords[i*3] * VOXEL_SIZE, hoveredFillCoords[i*3+1] * VOXEL_SIZE, hoveredFillCoords[i*3+2] * VOXEL_SIZE);
                                    bucketPreviewMesh.setMatrixAt(i, tempMatrix);
                                }
                                bucketPreviewMesh.instanceMatrix.needsUpdate = true;
                                bucketPreviewMesh.visible = true;
                            } else {
                                bucketPreviewMesh.visible = false;
                            }
                        }
                        
                        lastHoveredVoxel.set(gx, gy, gz);
                    }
                } else {
                    bucketPreviewMesh.visible = false;
                    if (activeTool !== 'paint' || paintMode !== 'bucket') {
                        lastHoveredVoxel.set(Infinity, Infinity, Infinity);
                        hoveredFillCoords.length = 0;
                    }
                }

                if (isDrawing) {
                    if (activeTool === 'select' && hasSelection) {
                        selectionOffset.copy(leftTargetLocal).sub(dragStartCtrlPos);
                        selectionOffset.x = Math.round(selectionOffset.x / VOXEL_SIZE) * VOXEL_SIZE;
                        selectionOffset.y = Math.round(selectionOffset.y / VOXEL_SIZE) * VOXEL_SIZE;
                        selectionOffset.z = Math.round(selectionOffset.z / VOXEL_SIZE) * VOXEL_SIZE;
                        selectionGroup.position.copy(dragStartOffset).add(selectionOffset);
                        selectionGroup.updateMatrix();
                    } else if (activeTool === 'select' && selectMode === 'box' && isPreviewingBox) {
                        updateBoxPreview(drawStartPos, leftTargetLocal, true);
                    } else if (activeTool === 'brush') {
                        if (!leftTargetLocal.equals(lastPaintedPos)) { placeBrushVoxels(leftTargetLocal, true); lastPaintedPos.copy(leftTargetLocal); }
                    } else if (activeTool === 'paint' && paintMode === 'brush') {
                        if (lastPaintedPos.x === Infinity) { placePaintVoxels(leftTargetLocal); lastPaintedPos.copy(leftTargetLocal); } 
                        else if (!leftTargetLocal.equals(lastPaintedPos)) { drawPaintLineVoxels(lastPaintedPos, leftTargetLocal); lastPaintedPos.copy(leftTargetLocal); }
                    } else if (activeTool === 'box' && isPreviewingBox) updateBoxPreview(drawStartPos, leftTargetLocal, true);
                    else if (activeTool === 'quadsphere' && isPreviewingSphere) updateSpherePreview(drawStartPos, leftTargetLocal, true);
                    else if (activeTool === 'plane' && isPreviewingPlane) updatePlanePreview(drawStartPos, leftTargetLocal, true);
                    else if (activeTool === 'pyramid' && isPreviewingPyramid) updateBoxPreview(drawStartPos, leftTargetLocal, true);
                }

                controllerRight.getWorldDirection(rightDir); rightTargetLocal.copy(rightPos).addScaledVector(rightDir, -0.05); worldGroup.worldToLocal(rightTargetLocal);
                rightTargetLocal.set(Math.round(rightTargetLocal.x / VOXEL_SIZE) * VOXEL_SIZE, Math.round(rightTargetLocal.y / VOXEL_SIZE) * VOXEL_SIZE, Math.round(rightTargetLocal.z / VOXEL_SIZE) * VOXEL_SIZE);
                cursorRight.position.copy(rightTargetLocal);
                cursorRight.updateMatrix();

                if (isErasing && !isColorPicking) {
                    if (activeTool === 'brush') {
                        if (!rightTargetLocal.equals(lastErasedPos)) { placeBrushVoxels(rightTargetLocal, false); lastErasedPos.copy(rightTargetLocal); }
                    } else if (activeTool === 'box' && isPreviewingBox) updateBoxPreview(drawStartPos, rightTargetLocal, false);
                    else if (activeTool === 'quadsphere' && isPreviewingSphere) updateSpherePreview(drawStartPos, rightTargetLocal, false);
                    else if (activeTool === 'plane' && isPreviewingPlane) updatePlanePreview(drawStartPos, rightTargetLocal, false);
                    else if (activeTool === 'pyramid' && isPreviewingPyramid) updateBoxPreview(drawStartPos, rightTargetLocal, false);
                }

                if (activeTool === 'stroke' && strokeMode === 'line') {
                    if (isPreviewingLineLeft || isPreviewingLineRight) {
                        const startPos = isPreviewingLineLeft ? lineStartLeft : lineStartRight;
                        const endPos = isPreviewingLineLeft ? leftTargetLocal : rightTargetLocal;
                        const isPainting = isPreviewingLineLeft;

                        const dist = startPos.distanceTo(endPos);
                        let steps = Math.max(1, Math.ceil(dist / (VOXEL_SIZE * 0.25))); 
                        if (steps > 300) steps = 300; 
                        
                        let instCount = 0;
                        const r = brushSize - 1;
                        const rSq = (r + 0.1) * (r + 0.1); 
                        
                        fillVisited.clear(); // Reusing the integer hash Set from Flood Fill to prevent rendering duplicate instances

                        for (let i = 0; i <= steps; i++) {
                            tempPos.lerpVectors(startPos, endPos, i / steps);
                            const cx = Math.round(tempPos.x / VOXEL_SIZE);
                            const cy = Math.round(tempPos.y / VOXEL_SIZE);
                            const cz = Math.round(tempPos.z / VOXEL_SIZE);
                            
                            for (let dx = -r; dx <= r; dx++) {
                                for (let dy = -r; dy <= r; dy++) {
                                    for (let dz = -r; dz <= r; dz++) {
                                        if (brushShape === 'sphere' && (dx*dx + dy*dy + dz*dz > rSq)) continue;
                                        
                                        // Lightning-fast bitshifted hash to prevent memory allocations
                                        const hash = (cx+dx + 32768) + (cy+dy + 32768) * 65536 + (cz+dz + 32768) * 4294967296;
                                        if (!fillVisited.has(hash)) {
                                            fillVisited.add(hash);
                                            if (instCount < 15000) {
                                                tempMatrix.makeTranslation((cx+dx)*VOXEL_SIZE, (cy+dy)*VOXEL_SIZE, (cz+dz)*VOXEL_SIZE);
                                                linePreviewMesh.setMatrixAt(instCount, tempMatrix);
                                                instCount++;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                        
                        linePreviewMesh.count = instCount;
                        linePreviewMesh.instanceMatrix.needsUpdate = true;
                        if (isPainting) {
                            linePreviewMat.color.copy(activeColorSlot === 1 ? brushColor : brushColor2);
                        } else {
                            linePreviewMat.color.setHex(0xff0055);
                        }
                        linePreviewMesh.visible = true;
                    } else {
                        linePreviewMesh.visible = false;
                    }
                } else {
                    linePreviewMesh.visible = false;
                }

                if (hasSelection) {
                    updatePreviews();
                } else if (previewGroups.length > 0 && previewGroups[0].visible) {
                    for (let i = 0; i < previewGroups.length; i++) previewGroups[i].visible = false;
                }

                const showToolMirrors = activeTool !== 'select';
                syncMirrorProxies(cursorLeft, cursorLeftMirrors, showToolMirrors);
                syncMirrorProxies(cursorRight, cursorRightMirrors, showToolMirrors && !isColorPicking);
                syncMirrorProxies(boxPreviewMesh, boxPreviewMirrors, showToolMirrors);
                syncMirrorProxies(spherePreviewMesh, spherePreviewMirrors, showToolMirrors);
                syncMirrorProxies(bucketPreviewMesh, bucketPreviewMirrors, showToolMirrors);
                syncMirrorProxies(linePreviewMesh, linePreviewMirrors, showToolMirrors);

                chunks.forEach(chunk => chunk.updateBuffers());
            }
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
