<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxTrotBravo Pro | Complete Voxel Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { margin: 0; overflow: hidden; background-color: #0a0a0f; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        .vr-ui-overlay { pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading-screen" class="fixed inset-0 z-[1000] flex flex-col items-center justify-center bg-[#0a0a0f] text-sky-400 transition-opacity duration-700">
        <h1 class="text-4xl font-bold tracking-tighter mb-2">VOXTROTBRAVO <span class="font-light text-white">PRO</span></h1>
        <div class="w-12 h-12 border-4 border-sky-400/20 border-t-sky-400 rounded-full animate-spin mb-4"></div>
        <p class="text-sm uppercase tracking-widest text-sky-400/60">Initializing Full Engine Assets</p>
    </div>

    <div class="vr-ui-overlay fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-black/80 backdrop-blur-md border border-white/10 p-6 rounded-2xl text-center min-w-[450px]">
        <h1 class="text-xl font-bold text-sky-400 mb-1">VoxTrotBravo PCVR</h1>
        <p class="text-[10px] text-sky-500/50 uppercase tracking-[0.2em] mb-3">Professional Voxel Creation Suite</p>
        <div class="grid grid-cols-2 gap-4 text-left text-[11px] text-gray-300">
            <div>
                <p><span class="text-sky-400 font-bold">R-Trigger:</span> Draw / Sliders</p>
                <p><span class="text-rose-500 font-bold">L-Trigger:</span> Erase / Deselect</p>
                <p><span class="text-emerald-400 font-bold">Grips:</span> Move & Scale World</p>
            </div>
            <div>
                <p><span class="text-amber-400 font-bold">A/B (R):</span> Tools & Global</p>
                <p><span class="text-violet-400 font-bold">X/Y (L):</span> Options & Color</p>
                <p><span class="text-sky-300 font-bold">Joysticks:</span> Color Shift</p>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        // --- Constants & Config ---
        const CONFIG = {
            VOXEL_SIZE: 0.05,
            CHUNK_SIZE: 32,
            CHUNK_VOL: 32768, // 32^3
            SEL_LIMIT: 200000,
            COLORS: { PRIMARY: 0x4facfe, SECONDARY: 0xff0055, ACCENT: 0x00ffcc, BG: 0x0a0a0f }
        };

        // --- Full Engine State ---
        const State = {
            activeTool: 'brush',
            brush: { shape: 'cube', volume: 'shell', size: 1, stroke: 'continuous' },
            sculpt: { size: 3, density: 5 },
            box: { mode: 'shell', grid: 'internal', divs: { x: 1, y: 1, z: 1 }, thick: 1, wireWidth: 1, wireFill: true },
            sphere: { mode: 'shell' },
            cylinder: { mode: 'solid', sides: 0, axis: 'Y', cap: true },
            poly: { type: 'cone', mode: 'solid', axis: 'Y', grid: 'internal', divs: 1, divThick: 1, cap: true, legs: 4 },
            platonic: { type: 'icosahedron', mode: 'wireframe', divs: 1, lock: true },
            plane: { outline: true, outThick: 1, fill: true, grid: true, gridThick: 1, divU: 2, divV: 2, thick: 1 },
            paint: { mode: 'brush' },
            select: { mode: 'box', filter: 'all', transform: 'move', copies: 1, active: false, isSettingPivot: false },
            
            // Selection specifics
            selection: { 
                base: [], active: [], center: new THREE.Vector3(), pivot: new THREE.Vector3(),
                rot: { x: 0, y: 0, z: 0 }, scale: 1.0, 
                stepRot: { x: 0, y: 0, z: 0 }, stepScale: 1.0,
                offset: new THREE.Vector3(), startPos: new THREE.Vector3(), startOffset: new THREE.Vector3()
            },

            // Materials
            matSlot: 0, subSlot: 0,
            slots: [
                { type: 0, mode: 'solid', colors: [new THREE.Color(0x4facfe), new THREE.Color(0xff0055)], h: 0.55, s: 1.0 },
                { type: 0, mode: 'solid', colors: [new THREE.Color(0x00ffcc), new THREE.Color(0xffff00)], h: 0.95, s: 1.0 }
            ],

            // World & Symmetries
            vLock: true, clearInterior: false, exportMode: 'boxes',
            symmetry: { x: false, y: false, z: false, polar: 1, active: [], version: 0 },
            
            // Internal logic
            isDrawing: false, isErasing: false, isPickingColor: false, isPaletteMagnified: false,
            activeSlider: null, shiftProgress: 0, shiftDir: 1,
            stats: { totalVoxels: 0 }
        };

        // --- Scene Initialization ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(CONFIG.COLORS.BG);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 3);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        const worldGroup = new THREE.Group();
        scene.add(worldGroup);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const grid = new THREE.GridHelper(20, 40, 0x222222, 0x111111);
        grid.position.y = -CONFIG.VOXEL_SIZE/2 - 0.001;
        worldGroup.add(grid);

        // --- Materials ---
        const voxelGeo = new THREE.BoxGeometry(1, 1, 1);
        const materials = [
            new THREE.MeshStandardMaterial({ roughness: 0.8, metalness: 0.2 }), // Solid
            new THREE.MeshPhysicalMaterial({ roughness: 0.1, metalness: 0.1, transmission: 0.8, thickness: 0.5, transparent: true, opacity: 0.5 }), // Glass
            new THREE.MeshBasicMaterial() // Emission
        ];

        // --- Voxel System Core ---
        class ChunkLayer {
            constructor(cx, cy, cz, mat) {
                this.material = mat;
                this.capacity = 2048;
                this.count = 0;
                this.mesh = new THREE.InstancedMesh(voxelGeo, mat, this.capacity);
                this.mesh.scale.set(CONFIG.VOXEL_SIZE, CONFIG.VOXEL_SIZE, CONFIG.VOXEL_SIZE);
                this.mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                this.mesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(this.capacity * 3), 3);
                this.mesh.instanceColor.setUsage(THREE.DynamicDrawUsage);
                this.mesh.matrixAutoUpdate = false;
                this.mesh.updateMatrix();
                
                this.vToIndex = new Uint16Array(CONFIG.CHUNK_VOL).fill(65535);
                this.indexToLocal = new Uint16Array(CONFIG.CHUNK_VOL);
                this.needsUpdate = false;
                worldGroup.add(this.mesh);
            }

            resize(newCap) {
                const old = this.mesh;
                const next = new THREE.InstancedMesh(voxelGeo, this.material, newCap);
                next.scale.copy(old.scale);
                next.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                next.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(newCap * 3), 3);
                next.instanceColor.setUsage(THREE.DynamicDrawUsage);
                if (this.count > 0) {
                    next.instanceMatrix.array.set(old.instanceMatrix.array.subarray(0, this.count * 16));
                    next.instanceColor.array.set(old.instanceColor.array.subarray(0, this.count * 3));
                }
                next.count = this.count;
                next.matrixAutoUpdate = false;
                next.updateMatrix();
                worldGroup.remove(old);
                worldGroup.add(next);
                old.dispose();
                this.mesh = next;
                this.capacity = newCap;
            }

            add(idx, gx, gy, gz, col) {
                if (this.vToIndex[idx] !== 65535) {
                    this.mesh.setColorAt(this.vToIndex[idx], col);
                    this.needsUpdate = true;
                } else {
                    if (this.count >= this.capacity) this.resize(Math.min(CONFIG.CHUNK_VOL, this.capacity * 2));
                    const i = this.count;
                    this.vToIndex[idx] = i;
                    this.indexToLocal[i] = idx;
                    const mat = new THREE.Matrix4().makeTranslation(gx, gy, gz);
                    this.mesh.setMatrixAt(i, mat);
                    this.mesh.setColorAt(i, col);
                    this.count++;
                    this.mesh.count = this.count;
                    this.needsUpdate = true;
                    State.stats.totalVoxels++;
                }
            }

            remove(idx) {
                const i = this.vToIndex[idx];
                if (i === 65535) return;
                const last = this.count - 1;
                if (i !== last) {
                    const lastLocalIdx = this.indexToLocal[last];
                    const m = new THREE.Matrix4();
                    const c = new THREE.Color();
                    this.mesh.getMatrixAt(last, m);
                    this.mesh.getColorAt(last, c);
                    this.mesh.setMatrixAt(i, m);
                    this.mesh.setColorAt(i, c);
                    this.vToIndex[lastLocalIdx] = i;
                    this.indexToLocal[i] = lastLocalIdx;
                }
                this.vToIndex[idx] = 65535;
                this.count--;
                this.mesh.count = this.count;
                this.needsUpdate = true;
                State.stats.totalVoxels--;
            }

            sync() {
                if (!this.needsUpdate) return;
                this.mesh.instanceMatrix.needsUpdate = true;
                this.mesh.instanceColor.needsUpdate = true;
                this.mesh.visible = this.count > 0;
                this.needsUpdate = false;
            }
        }

        class Chunk {
            constructor(cx, cy, cz) {
                this.cx = cx; this.cy = cy; this.cz = cz;
                this.layers = [null, null, null];
                this.matMap = new Int8Array(CONFIG.CHUNK_VOL).fill(-1);
            }
            set(lx, ly, lz, gx, gy, gz, col, mat) {
                const idx = lx | (ly << 5) | (lz << 10);
                const cur = this.matMap[idx];
                if (cur !== -1 && cur !== mat) this.layers[cur].remove(idx);
                if (!this.layers[mat]) this.layers[mat] = new ChunkLayer(this.cx, this.cy, this.cz, materials[mat]);
                this.matMap[idx] = mat;
                this.layers[mat].add(idx, gx, gy, gz, col);
            }
            del(lx, ly, lz) {
                const idx = lx | (ly << 5) | (lz << 10);
                const cur = this.matMap[idx];
                if (cur !== -1) { this.layers[cur].remove(idx); this.matMap[idx] = -1; }
            }
            update() { this.layers.forEach(l => l && l.sync()); }
        }

        const Chunks = new Map();
        function getChunk(gx, gy, gz) {
            const cx = gx >> 5, cy = gy >> 5, cz = gz >> 5;
            const key = `${cx},${cy},${cz}`;
            let chunk = Chunks.get(key);
            if (!chunk) { chunk = new Chunk(cx, cy, cz); Chunks.set(key, chunk); }
            return chunk;
        }

        function setVoxel(gx, gy, gz, active, color, mat = 0) {
            const chunk = getChunk(gx, gy, gz);
            const lx = gx & 31, ly = gy & 31, lz = gz & 31;
            if (active) chunk.set(lx, ly, lz, gx, gy, gz, color, mat);
            else chunk.del(lx, ly, lz);
        }

        // --- Symmetry Engine ---
        function updateSymmetry() {
            const list = [];
            let mirrors = [{ x: 1, y: 1, z: 1 }];
            if (State.symmetry.x) { const len = mirrors.length; for (let i = 0; i < len; i++) mirrors.push({ ...mirrors[i], x: -1 }); }
            if (State.symmetry.y) { const len = mirrors.length; for (let i = 0; i < len; i++) mirrors.push({ ...mirrors[i], y: -1 }); }
            if (State.symmetry.z) { const len = mirrors.length; for (let i = 0; i < len; i++) mirrors.push({ ...mirrors[i], z: -1 }); }
            for (let m of mirrors) {
                for (let p = 0; p < State.symmetry.polar; p++) {
                    const angle = (p * 2 * Math.PI) / State.symmetry.polar;
                    list.push({ sx: m.x, sy: m.y, sz: m.z, cos: Math.cos(angle), sin: Math.sin(angle), pIdx: p });
                }
            }
            State.symmetry.active = list; State.symmetry.version++;
        }
        updateSymmetry();

        function setVoxelSym(gx, gy, gz, active, color, mat = 0) {
            for (let sym of State.symmetry.active) {
                const mx = gx * sym.sx, my = gy * sym.sy, mz = gz * sym.sz;
                let px = mx, pz = mz;
                if (sym.pIdx > 0) {
                    px = Math.round(mx * sym.cos + mz * sym.sin);
                    pz = Math.round(-mx * sym.sin + mz * sym.cos);
                }
                setVoxel(px, my, pz, active, color, mat);
            }
        }

        // --- Tool & Geometry Algorithms ---
        function getDrawColor(gx, gy, gz, minX, maxX, minY, maxY, slotIdx) {
            const s = State.slots[slotIdx], mode = s.mode, cA = s.colors[0], cB = s.colors[1];
            if (mode === 'solid') return cA;
            if (mode === 'grad_h') { let t = (maxX > minX) ? (gx - minX) / (maxX - minX) : 0; return new THREE.Color().copy(cA).lerp(cB, t); }
            if (mode === 'grad_v') { let t = (maxY > minY) ? (gy - minY) / (maxY - minY) : 0; return new THREE.Color().copy(cA).lerp(cB, t); }
            if (mode === 'shift') return new THREE.Color().copy(cA).lerp(cB, State.shiftProgress);
            return cA;
        }

        function executeBoxTool(startPos, endPos, isPainting) {
            const minX = Math.min(Math.round(startPos.x / CONFIG.VOXEL_SIZE), Math.round(endPos.x / CONFIG.VOXEL_SIZE));
            const maxX = Math.max(Math.round(startPos.x / CONFIG.VOXEL_SIZE), Math.round(endPos.x / CONFIG.VOXEL_SIZE));
            const minY = Math.min(Math.round(startPos.y / CONFIG.VOXEL_SIZE), Math.round(endPos.y / CONFIG.VOXEL_SIZE));
            const maxY = Math.max(Math.round(startPos.y / CONFIG.VOXEL_SIZE), Math.round(endPos.y / CONFIG.VOXEL_SIZE));
            const minZ = Math.min(Math.round(startPos.z / CONFIG.VOXEL_SIZE), Math.round(endPos.z / CONFIG.VOXEL_SIZE));
            const maxZ = Math.max(Math.round(startPos.z / CONFIG.VOXEL_SIZE), Math.round(endPos.z / CONFIG.VOXEL_SIZE));

            const w = State.box.wireWidth - 1;
            for(let gx = minX; gx <= maxX; gx++) for(let gy = minY; gy <= maxY; gy++) for(let gz = minZ; gz <= maxZ; gz++) {
                const isFace = (gx === minX || gx === maxX || gy === minY || gy === maxY || gz === minZ || gz === maxZ);
                const isEdge = ((gx <= minX + w || gx >= maxX - w) ? 1 : 0) + ((gy <= minY + w || gy >= maxY - w) ? 1 : 0) + ((gz <= minZ + w || gz >= maxZ - w) ? 1 : 0) >= 2;
                
                if (State.clearInterior && isPainting && !isFace && State.box.mode !== 'solid') { setVoxelSym(gx, gy, gz, false, null); continue; }
                
                let draw = false, col = getDrawColor(gx, gy, gz, minX, maxX, minY, maxY, 0), mat = State.slots[0].type;
                if (State.box.mode === 'wireframe') { 
                    if (isEdge) { draw = true; col = getDrawColor(gx, gy, gz, minX, maxX, minY, maxY, 1); mat = State.slots[1].type; }
                    else if (State.box.wireFill && isFace) draw = true;
                } else if (State.box.mode === 'shell') {
                    if (isFace) draw = true;
                } else draw = true;

                if (draw) setVoxelSym(gx, gy, gz, isPainting, col, mat);
            }
        }

        // --- VR Interaction & Menus ---
        const menuCanvases = { left: document.createElement('canvas'), right: document.createElement('canvas'), color: document.createElement('canvas'), global: document.createElement('canvas') };
        const menuTextures = {};
        const menuMeshes = {};

        function initMenus() {
            Object.keys(menuCanvases).forEach(key => {
                const c = menuCanvases[key]; c.width = 512; c.height = 512;
                menuTextures[key] = new THREE.CanvasTexture(c);
                menuMeshes[key] = new THREE.Mesh(new THREE.PlaneGeometry(0.18, 0.18), new THREE.MeshBasicMaterial({ map: menuTextures[key], transparent: true, side: THREE.DoubleSide }));
                menuMeshes[key].visible = false;
                menuMeshes[key].position.set(0, 0.15, -0.05);
                menuMeshes[key].rotation.x = -Math.PI/4;
            });
        }
        initMenus();

        function drawButton(ctx, x, y, w, h, text, active) {
            const grad = ctx.createLinearGradient(x, y, x, y + h);
            grad.addColorStop(0, active ? '#4facfe' : '#222'); grad.addColorStop(1, active ? '#00f2fe' : '#111');
            ctx.fillStyle = grad; ctx.roundRect(x, y, w, h, 8); ctx.fill();
            ctx.strokeStyle = active ? '#fff' : '#444'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.font = '600 18px Inter'; ctx.textAlign = 'center'; ctx.fillText(text, x + w/2, y + h/2 + 7);
        }

        function renderToolMenu() {
            const ctx = menuCanvases.right.getContext('2d'); ctx.clearRect(0,0,512,512);
            ctx.fillStyle = 'rgba(10, 10, 15, 0.95)'; ctx.roundRect(0,0,512,512,20); ctx.fill();
            ctx.fillStyle = '#4facfe'; ctx.font = 'bold 24px Inter'; ctx.textAlign = 'center'; ctx.fillText("TOOL SELECTION", 256, 40);
            const tools = ["Brush", "Stroke", "Sheet", "Paint", "Sculpt", "Box", "Sphere", "Cylinder", "Poly", "Platonic", "Plane", "Select"];
            tools.forEach((t, i) => drawButton(ctx, 40, 60 + i * 36, 432, 32, t, State.activeTool === t.toLowerCase()));
            menuTextures.right.needsUpdate = true;
        }

        // --- Main Engine Implementation ---
        const controllers = { left: null, right: null };
        const raycaster = new THREE.Raycaster();
        const cursorR = new THREE.Mesh(voxelGeo, new THREE.MeshBasicMaterial({ color: CONFIG.COLORS.PRIMARY, wireframe: true, transparent: true, opacity: 0.5 }));
        const cursorL = new THREE.Mesh(voxelGeo, new THREE.MeshBasicMaterial({ color: CONFIG.COLORS.SECONDARY, wireframe: true, transparent: true, opacity: 0.5 }));
        cursorR.scale.set(CONFIG.VOXEL_SIZE, CONFIG.VOXEL_SIZE, CONFIG.VOXEL_SIZE);
        cursorL.scale.set(CONFIG.VOXEL_SIZE, CONFIG.VOXEL_SIZE, CONFIG.VOXEL_SIZE);
        worldGroup.add(cursorR, cursorL);

        function setupController(idx) {
            const c = renderer.xr.getController(idx);
            const g = renderer.xr.getControllerGrip(idx);
            c.addEventListener('selectstart', (e) => { 
                const hand = e.target === controllers.right.c ? 'right' : 'left';
                if (hand === 'right') { State.isDrawing = true; State.drawStart = cursorR.position.clone(); }
                else { State.isErasing = true; State.drawStart = cursorL.position.clone(); }
            });
            c.addEventListener('selectend', (e) => {
                const hand = e.target === controllers.right.c ? 'right' : 'left';
                if (hand === 'right') { 
                    if (State.activeTool === 'box') executeBoxTool(State.drawStart, cursorR.position, true);
                    State.isDrawing = false; 
                } else { 
                    if (State.activeTool === 'box') executeBoxTool(State.drawStart, cursorL.position, false);
                    State.isErasing = false; 
                }
            });
            scene.add(c, g);
            return { c, g, pos: new THREE.Vector3(), dir: new THREE.Vector3() };
        }
        controllers.right = setupController(0);
        controllers.left = setupController(1);
        controllers.right.c.add(menuMeshes.right);

        // --- Loop ---
        renderer.setAnimationLoop((time) => {
            State.shiftProgress += 0.005 * State.shiftDir;
            if (State.shiftProgress >= 1 || State.shiftProgress <= 0) State.shiftDir *= -1;

            if (renderer.xr.isPresenting) {
                [controllers.right, controllers.left].forEach((hand, idx) => {
                    hand.pos.setFromMatrixPosition(hand.c.matrixWorld);
                    hand.dir.set(0, 0, -1).transformDirection(hand.c.matrixWorld);
                    const target = new THREE.Vector3().copy(hand.pos).addScaledVector(hand.dir, 0.1);
                    worldGroup.worldToLocal(target);
                    const gx = Math.round(target.x / CONFIG.VOXEL_SIZE), gy = Math.round(target.y / CONFIG.VOXEL_SIZE), gz = Math.round(target.z / CONFIG.VOXEL_SIZE);
                    const cursor = idx === 0 ? cursorR : cursorL;
                    cursor.position.set(gx * CONFIG.VOXEL_SIZE, gy * CONFIG.VOXEL_SIZE, gz * CONFIG.VOXEL_SIZE);
                    
                    if (State.isDrawing && idx === 0 && State.activeTool === 'brush') {
                        setVoxelSym(gx, gy, gz, true, getDrawColor(gx, gy, gz, 0, 0, 0, 0, 0), State.slots[0].type);
                    } else if (State.isErasing && idx === 1 && State.activeTool === 'brush') {
                        setVoxelSym(gx, gy, gz, false, null);
                    }
                });
                renderToolMenu();
                menuMeshes.right.visible = true;
            }
            Chunks.forEach(c => c.update());
            renderer.render(scene, camera);
        });

        // Final UI cleanup
        window.addEventListener('load', () => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').remove(), 700);
        });
    </script>
</body>
</html>
